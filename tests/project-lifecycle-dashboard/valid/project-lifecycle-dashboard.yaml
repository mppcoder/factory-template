schema: project-lifecycle-dashboard/v1
project:
  name: "Demo"
  slug: "demo"
  profile: "greenfield-product"
  lifecycle_state: "greenfield-active"
  current_mode: "greenfield"
  factory_producer_owned_layer: false
  owner_boundary: template-owned-generated-project-artifact
lifecycle_phase:
  current: execution
  previous: handoff
  next: verification
  allowed: [idea, intake, spec, architecture, handoff, execution, verification, release, deploy, operate, improve]
active_change:
  id: chg-demo-001
  title: "Demo lifecycle dashboard"
  class: feature
  priority: medium
  status: in_progress
  owner_boundary: internal-repo-follow-up
  source_artifacts: [".chatgpt/task-index.yaml"]
stage_gates:
  - id: intake
    title: "Intake принят"
    status: passed
    evidence: [".chatgpt/intake.yaml"]
  - id: classification
    title: "Маршрут выбран"
    status: passed
    evidence: [".chatgpt/stage-state.yaml"]
  - id: reuse_reality_check
    title: "Reality-check выполнен"
    status: passed
    evidence: [".chatgpt/reality-check.md"]
  - id: spec
    title: "User spec готов"
    status: passed
    evidence: [".chatgpt/user-spec.md"]
  - id: tech_spec
    title: "Tech spec готов"
    status: passed
    evidence: [".chatgpt/tech-spec.md"]
  - id: handoff_allowed
    title: "Handoff разрешен"
    status: passed
    evidence: [".chatgpt/normalized-codex-handoff.md"]
  - id: execution
    title: "Execution идет"
    status: in_progress
    evidence: []
  - id: verification
    title: "Verification ожидает"
    status: pending
    evidence: []
  - id: done
    title: "Done ожидает"
    status: pending
    evidence: []
multi_step_execution:
  current_wave: 2
  waves:
    - id: wave-1
      title: "Contract"
      status: completed
      evidence: ["work/features/demo/logs/checkpoint.yaml"]
      tasks:
        - id: T-001
          title: "Contract"
          status: done
          owner_boundary: internal-repo-follow-up
          evidence: ["work/features/demo/tasks/T-001.md"]
    - id: wave-2
      title: "Implementation"
      status: in_progress
      tasks:
        - id: T-002
          title: "Renderer"
          status: in_progress
          owner_boundary: internal-repo-follow-up
          evidence: []
  completed_tasks: [T-001]
  blocked_tasks: []
  next_task:
    id: T-002
    owner_boundary: internal-repo-follow-up
    action: "Закончить renderer."
  final_verification:
    status: pending
    evidence: []
  archive_to_work_completed:
    allowed: false
    reason: "Нужна final verification."
handoff_orchestration:
  parent_handoff:
    id: parent-demo
    title: "Demo parent"
    status: executing
  child_tasks: []
  selected_profile: deep
  selected_model: gpt-5.5
  selected_reasoning_effort: high
  selected_plan_mode_reasoning_effort: high
  route_explanation_boundary: "Advisory layer не переключает model/profile/reasoning внутри уже открытой Codex-сессии; нужен новый task launch или ручной picker."
  source_artifacts: [".chatgpt/orchestration-cockpit.yaml"]
beginner_visual_surfaces:
  no_heavy_default_ui: true
  default_surfaces: [chatgpt-mini-card, codex-execution-card, markdown-dashboard]
  heavy_ui_boundary: "Default is ChatGPT mini card, Codex execution card and Markdown dashboard only; web app, daemon, SQLite, Telegram notifications, websocket/live-refresh and background worker are not default promises."
  source_of_truth: ".chatgpt/project-lifecycle-dashboard.yaml"
  status_vocabulary: [pending, in_progress, blocked, passed, failed, completed, not_applicable]
  owner_boundaries:
    - internal-repo-follow-up
    - external-user-action
    - runtime-action
    - downstream-battle-action
    - model-mapping-blocker
    - secret-boundary-blocker
  chatgpt_mini_card:
    enabled: true
    template: ".chatgpt/visual-status-card.md.template"
    renders_from_dashboard_yaml: true
    user_action_policy: derive_from_external_actions_ledger
    user_action_required: derive_from_external_actions_ledger
    required_fields: [project, phase, active_task, status, completed, blockers, user_action_required, next_safe_action]
  codex_execution_card:
    enabled: true
    template: ".chatgpt/codex-execution-card.md.template"
    renders_from_dashboard_yaml: true
    scenario: "project-lifecycle-dashboard / beginner visual dashboard UX"
    execution_evidence_policy: green_status_requires_evidence_or_accepted_reason
    required_sections: [route_receipt, progress, blockers, next, external]
  markdown_dashboard:
    enabled: true
    output: "reports/project-lifecycle-dashboard.md"
    renders_from_dashboard_yaml: true
release_readiness:
  version: "0.1.0"
  status: pending
  changelog: "CHANGELOG.md"
  release_notes: "RELEASE_NOTES.md"
  scorecard: "docs/releases/release-scorecard.yaml"
  verification_state: pending
  evidence: []
deploy_runtime:
  status: pending
  preset: starter
  operator_dashboard_source: "template-repo/scripts/operator-dashboard.py"
  runtime_reports: [".factory-runtime/reports/deploy-dry-run-latest.txt"]
  evidence: []
  boundary: "Dry-run не является real deploy proof."
standards_navigator:
  selected_profile: solo_lightweight
  standards_registry: "template-repo/standards/lifecycle-standards-registry.yaml"
  stage_map: "template-repo/standards/lifecycle-stage-map.yaml"
  gates_source: ".chatgpt/standards-gates.yaml"
  lifecycle_backbone:
    standard_ref: iso_12207
    selected_version: "2017"
    version_status: current_with_revision_pending
    source_verification_status: current_with_revision_pending
    verify_current_gate: true
  current_phase_required_standards:
    phase: implementation
    standard_refs: [iso_12207, nist_ssdf]
    required_gates: [lifecycle_intent_recorded, security_minimum_checked]
  gate_summary: {total: 4, passed: 2, missing: 2, blocking: 0}
  gates:
    - id: lifecycle_intent_recorded
      status: passed
      standard_refs: [iso_12207]
      evidence: [".chatgpt/task-index.yaml"]
    - id: security_minimum_checked
      status: passed
      standard_refs: [nist_ssdf]
      evidence: ["VERIFY_SUMMARY.md"]
    - id: accessibility_minimum_checked
      status: pending
      standard_refs: [wcag_22]
      evidence: []
      accepted_reason: ""
    - id: ai_safety_gate
      status: not_applicable
      standard_refs: [openai_ai_safety_overlay]
      evidence: []
      accepted_reason: "Project has no AI behavior."
  missing_standards_evidence: [accessibility_minimum_checked, quality_minimum_checked]
  next_safe_standards_action:
    owner_boundary: internal-repo-follow-up
    action: "Заполнить missing standards evidence."
    evidence: []
  monitoring_status:
    watchlist: "template-repo/standards/standards-watchlist.yaml"
    last_checked_utc: "2026-04-29T00:00:00Z"
    status: current
    proposal_required: false
  claims:
    production_target: false
    commercial_claim: false
    ai_app: false
    ai_ready_for_users: false
    formal_certification_claim: false
    compliance_claim: false
    claim_evidence: []
  allowed_to_advance_phase: false
  false_compliance_boundary: "Standards navigator is not certification."
software_update_governance:
  baseline_status: pending
  auto_update_policy: manual-approved-upgrade
  last_update_intelligence_check: ""
  relevant_findings_count: 0
  upgrade_proposal_status: not_started
  next_safe_action:
    owner_boundary: internal-repo-follow-up
    action: "Заполнить software inventory."
    evidence: []
  fallback_action:
    owner_boundary: internal-repo-follow-up
    action: "Заблокировать upgrade proposal до baseline evidence."
    evidence: []
  blockers: []
  source_artifacts:
    - ".chatgpt/software-inventory.yaml"
    - ".chatgpt/software-update-watchlist.yaml"
    - ".chatgpt/software-update-readiness.yaml"
    - "reports/software-updates/README.md"
post_release_improvement:
  incidents: []
  feedback: []
  learning_proposals: []
  backlog_candidates: []
external_actions_ledger:
  - id: approve-runtime
    owner_boundary: runtime-action
    action: "Одобрить runtime deploy только после проверки secrets boundary."
recommended_next_step:
  owner_boundary: internal-repo-follow-up
  action: "Закончить T-002."
  evidence: []
fallback_next_step:
  owner_boundary: internal-repo-follow-up
  action: "Если T-002 заблокирован, обновить blocker."
  evidence: []
