    selected_model: gpt-5.5
    selected_reasoning_effort: medium
    selected_plan_mode_reasoning_effort: medium
    status: ready
    priority: medium
    calculated_priority: critical
    depends_on: []
    blocks: [HIR-002, HIR-003]
    owner_boundary: internal-repo-follow-up
    artifacts_to_update: ["src/prerequisite.py"]
    evidence:
      - "Captured from fixture handoff."
    closeout_reason: ""
    deactivation_handoff_required: false
    next_action: "Implement prerequisite first."
