services:
  app:
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${DB_USER:-app}:${DB_PASSWORD}@db:5432/${DB_NAME:-app}

  db:
    image: ${DB_IMAGE:-postgres:16-alpine}
    container_name: ${DB_CONTAINER_NAME:-factory-template-db}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-app}
      POSTGRES_USER: ${DB_USER:-app}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - app_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true

  db-backup:
    image: ${DB_IMAGE:-postgres:16-alpine}
    profiles:
      - backup
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGPASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-app}
      POSTGRES_USER: ${DB_USER:-app}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
    volumes:
      - ${BACKUP_PATH:-./backups}:/backups
    networks:
      - app_net
    entrypoint: ["/bin/sh", "-lc"]
    command: >
      mkdir -p /backups &&
      pg_dump -h db -U "$${POSTGRES_USER}" "$${POSTGRES_DB}" > "/backups/$${POSTGRES_DB}-latest.sql" &&
      find /backups -type f -name '*.sql' -mtime +"$${BACKUP_RETENTION_DAYS}" -delete

volumes:
  db_data:
