<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Factory Template Runtime Placeholder</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #22313a;
      --muted: #60737b;
      --line: #d7e0df;
      --accent: #2b5f73;
      --bg: #f6f8f5;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--ink);
      background: var(--bg);
    }
    main {
      width: min(1040px, 100%);
      display: grid;
      gap: 24px;
    }
    img {
      width: 100%;
      height: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      display: block;
    }
    section {
      display: grid;
      gap: 10px;
      max-width: 760px;
    }
    h1 {
      margin: 0;
      font-size: clamp(32px, 6vw, 64px);
      line-height: 1.02;
      letter-spacing: 0;
    }
    p {
      margin: 0;
      font-size: 18px;
      line-height: 1.55;
      color: var(--muted);
    }
    code {
      color: var(--accent);
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <img src="/placeholder.svg" alt="Factory Template runtime placeholder image">
    <section>
      <h1>Factory Template runtime placeholder</h1>
      <p>Production preset is serving a generated placeholder page. Replace <code>APP_IMAGE</code> or install a custom placeholder image URL when the real application is ready.</p>
    </section>
  </main>
</body>
</html>
