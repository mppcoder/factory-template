      - README.md
      - CHANGELOG.md
      - CURRENT_FUNCTIONAL_STATE.md
      - docs/releases/factory-template-release-notes.md
      - template-repo/project-presets.yaml
      - template-repo/change-classes.yaml
      - template-repo/codex-routing.yaml
      - CONTROLLED_FIXES_AUDIT_2026-04-19.md
      - TEST_REPORT.md

  core_hot_direct:
    export_name: core-hot-15
    kind: direct_sources
    purpose: direct reference profile for daily ChatGPT Project work
    export_layout: flat
    upload_subdir: upload-to-sources
    naming_strategy: basename_unless_conflict_then_path_joined_with_double_underscore
    archive_profile: core_archive
    cold_archive_profile: core_cold_archive
    files:
      - template-repo/scenario-pack/00-master-router.md
      - template-repo/scenario-pack/01-global-rules.md
      - template-repo/scenario-pack/02-decision-policy.md
      - template-repo/scenario-pack/03-stage-gates.md
      - template-repo/scenario-pack/15-handoff-to-codex.md
      - template-repo/scenario-pack/16-done-closeout.md
      - docs/operator/factory-template/01-runbook-dlya-polzovatelya-factory-template.md
      - docs/operator/factory-template/02-runbook-dlya-codex-factory-template.md
      - docs/operator/factory-template/03-mode-routing-factory-template.md
      - docs/operator/factory-template/04-vps-remote-ssh-full-handoff-orchestration.md
      - docs/operator/factory-template/07-AGENTS-factory-template.md
      - CURRENT_FUNCTIONAL_STATE.md
      - template-repo/change-classes.yaml
      - template-repo/project-presets.yaml
      - template-repo/codex-routing.yaml

  core_cold_archive:
    export_name: core-cold-5
    kind: archive_pack
    purpose: cold/reference remainder archive for hybrid repo-first ChatGPT Project work
    canonical_archive_profile: core_archive
    direct_profile: core_hot_direct
    files:
      - README.md
      - CHANGELOG.md
      - TEST_REPORT.md
      - CONTROLLED_FIXES_AUDIT_2026-04-19.md
      - docs/releases/factory-template-release-notes.md

  release_archive:
    export_name: sources-pack-release-20
    kind: archive_pack
    purpose: release-oriented reference/export pack for final verification and packaging
    files:
      - README.md
      - VERSION.md
      - CHANGELOG.md
      - CURRENT_FUNCTIONAL_STATE.md
      - FACTORY_MANIFEST.yaml
      - RELEASE_BUILD.sh
      - PRE_RELEASE_AUDIT.sh
      - VERSION_SYNC_CHECK.sh
      - CLEAN_VERIFY_ARTIFACTS.sh
      - TEST_REPORT.md
      - RELEASE_CHECKLIST.md
      - VERIFY_SUMMARY.md
      - RELEASE_NOTE_TEMPLATE.md
      - docs/releases/factory-template-release-notes.md
      - template-repo/CHANGELOG.md
      - template-repo/README.md
      - template-repo/TEMPLATE_MANIFEST.yaml
      - docs/operator/factory-template/01-runbook-dlya-polzovatelya-factory-template.md
      - docs/operator/factory-template/02-runbook-dlya-codex-factory-template.md
      - RELEASE_NOTES.md

