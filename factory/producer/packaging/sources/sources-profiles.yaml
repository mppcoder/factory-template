    export_name: sources-pack-core-20
    kind: archive_pack
    purpose: canonical archive pack for steady factory-template work
    direct_profile: core_hot_direct
    cold_reference_files:
      - README.md
      - CHANGELOG.md
      - TEST_REPORT.md
      - CONTROLLED_FIXES_AUDIT_2026-04-19.md
      - docs/releases/factory-template-release-notes.md
    files:
      - template-repo/scenario-pack/00-master-router.md
      - template-repo/scenario-pack/01-global-rules.md
      - template-repo/scenario-pack/02-decision-policy.md
      - template-repo/scenario-pack/03-stage-gates.md
      - template-repo/scenario-pack/15-handoff-to-codex.md
