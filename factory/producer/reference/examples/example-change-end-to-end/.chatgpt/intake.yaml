project:
  name: "Сервис уведомлений для внутренних команд"
  slug: "notification-service-demo"
  mode: "brownfield" # Режим проекта: greenfield или brownfield
  owner: "Внутренняя продуктовая команда"
  repo_url: "https://git.example.local/internal/notification-service"
  notes: "Демонстрационный проект для сквозного примера change lifecycle"

request:
  summary: "Добавить безопасный повтор уведомления при временной ошибке внешнего API"
  requested_outcome: "Снизить потери уведомлений при кратковременных сбоях интеграции"
  constraints:
    - "Не нарушить идемпотентность"
    - "Не увеличить число дублей сверх допустимого"
    - "Сохранить трассируемость попыток доставки"
  risks:
    - "Повторы могут создать дубли на стороне получателя"
    - "Неправильная классификация ошибок приведёт к лишним повторам"
