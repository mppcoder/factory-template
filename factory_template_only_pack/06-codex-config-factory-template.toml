# Static default нужен только как fallback; task routing делается launcher-слоем.
model = "gpt-5.5"
model_reasoning_effort = "medium"
approval_policy = "on-request"
profile = "build"

[shell_environment_policy]
include_only = ["PATH", "HOME", "USER", "SHELL", "LANG", "LC_ALL", "TERM"]

[profiles.quick]
model = "gpt-5.4-mini"
model_reasoning_effort = "low"
approval_policy = "on-request"

[profiles.build]
model = "gpt-5.5"
model_reasoning_effort = "medium"
approval_policy = "on-request"

[profiles.deep]
model = "gpt-5.5"
model_reasoning_effort = "high"
approval_policy = "on-request"

[profiles.review]
model = "gpt-5.5"
model_reasoning_effort = "high"
approval_policy = "on-request"
