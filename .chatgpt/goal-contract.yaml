goal_contract:
  version: goal-contract/v1
  goal_id: health-sync-bridge-greenfield-prd
  goal_command_source:
    raw_user_goal: "Create greenfield project Health Sync Bridge through factory-template guided launcher and prepare feasibility-first PRD."
    normalized_goal: "Создать greenfield-проект Health Sync Bridge как приватный health-sync hub для автоматического сбора, нормализации, аудита и допустимой синхронизации данных Withings и Garmin после однократной OAuth/consent авторизации."
    goal_first_trigger: direct_codex_task
  outcome:
    desired_result: "Downstream project exists with PROJECT_CODE=HSB, filled project knowledge, feasibility-first PRD, API blocker matrix, data mapping, OAuth/secrets architecture, dev+prod VPS layout and first implementation backlog."
    definition_of_done:
      - "downstream project создан через factory-template guided launcher"
      - "repo-local PROJECT_CODE=HSB материализован"
      - "project-knowledge создан и заполнен"
      - "PRD описывает MVP, non-goals и API blockers"
      - "есть feasibility matrix по Withings API, Garmin API, Health Connect, Apple Health/MyFitnessPal fallback"
      - "есть data mapping v0 for target health domains"
      - "есть OAuth/secrets architecture без хранения паролей Garmin/Withings"
      - "есть dev+prod VPS layout plan"
      - "есть first implementation backlog"
    success_metrics:
      - "Health Sync Bridge repo exists at /projects/health-sync-bridge"
      - "GitHub repo name is exactly mppcoder/health-sync-bridge"
      - "downstream quick verify passes"
    evidence_required:
      - "route receipt"
      - "generated project path"
      - "generated project identity"
      - "project-knowledge files"
      - "PRD file path"
      - "feasibility matrix file path"
      - "first task workspace path"
      - "validation/preflight output"
    evidence_sources:
      - "/projects/health-sync-bridge"
      - "/projects/health-sync-bridge/docs/prd/health-sync-bridge-prd.md"
      - "/projects/health-sync-bridge/docs/research/api-feasibility-withings-garmin.md"
      - "/projects/health-sync-bridge/project-knowledge"
      - "official Withings and Garmin documentation"
  boundaries:
    scope:
      - "project bootstrap"
      - "feasibility-first PRD"
      - "architecture and backlog"
      - "no production credentials yet"
      - "no unofficial credential scraping"
    non_goals:
      - "не реализовывать неофициальный парсинг Garmin Connect логина/пароля"
      - "не обходить ToS"
      - "не обещать запись данных в Garmin/Withings без official API proof"
      - "не хранить raw health secrets вне env/secret store"
    destructive_actions_allowed: false
    production_actions_allowed: false
    secrets_allowed: false
  validation:
    primary_verification_commands:
      - "python3 template-repo/scripts/validate-goal-contract.py .chatgpt/goal-contract.yaml"
      - "python3 template-repo/scripts/validate-codex-routing.py ."
      - "python3 template-repo/scripts/validate-codex-work-index.py .chatgpt/codex-work-index.yaml"
      - "bash scripts/verify-all.sh quick in /projects/health-sync-bridge"
    secondary_verification:
      - "python3 scripts/preflight-vps-check.py --project-slug health-sync-bridge"
      - "python3 scripts/validate-operator-env.py . --env-file deploy/.env.example --preset starter --allow-example-placeholders"
      - "git status --short --branch"
    proxy_signal_denylist:
      - "tests passed alone"
      - "file exists alone"
      - "commit exists alone"
      - "green dashboard alone"
      - "validator passed alone"
    goal_achievement_rule: "mark achieved only when evidence satisfies DoD, not when proxy signals pass"
  runtime:
    goal_runtime_recommendation: goal_first_contract_only
    codex_goal_live_validation_required: true
    codex_goal_live_validation_evidence: "Current task uses repo goal-first contract only; no /goal runtime switch is claimed for this already-open session."
    tool_feedback_ready: true
    mcp_or_metrics_needed:
      - "repo validators"
      - "official API documentation checks"
      - "GitHub CLI"
      - "project lifecycle card renderer"
    observation_cadence: "operator check every 15-20 minutes for long goal loops"
    budget_guardrails:
      token_budget: ""
      time_budget: ""
      max_iterations: ""
      stop_when:
        - budget_limited
        - tool_limited
        - quota_wall
        - goal_drift
        - unsafe_action
    pause_resume_policy:
      user_controls_lifecycle: true
      model_must_not_clear_or_pause_goal_without_user_instruction: true
  continuation:
    if_budget_limited:
      required_summary:
        - done
        - remaining
        - blockers
        - next recommended goal
    if_unmet:
      create_followup_handoff: true
  side_channel:
    allowed_for_clarifications: true
    must_not_mutate_goal_without_confirmation: true
  closeout:
    goal_status: achieved
    evidence_vs_dod:
      - "Project created at /projects/health-sync-bridge with PROJECT_CODE=HSB."
      - "PRD, feasibility matrix, data mapping, OAuth/security, dev+prod layout and first backlog were added."
      - "Downstream quick verify passed."
      - "Garmin/Withings API blockers are documented and not hidden behind proxy signals."
    proxy_signal_closure_used: false
    continuation_summary:
      done:
        - "Health Sync Bridge bootstrap and PRD package created"
      remaining:
        - "user/operator chooses whether to start Withings OAuth implementation or Garmin approval preparation"
      blockers:
        - "Garmin Developer Program approval"
        - "real Withings OAuth credentials"
        - "production domain/TLS and encrypted health-data storage approval"
      next_recommended_goal: "start Withings OAuth connector or Garmin approval spike"
