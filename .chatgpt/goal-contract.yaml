goal_contract:
  version: goal-contract/v1
  goal_id: garmin-developer-program-approval
  goal_command_source:
    raw_user_goal: "Получи Garmin Developer Program approval."
    normalized_goal: "Подготовить и довести до внешнего шага получение Garmin Connect Developer Program approval: выяснить официальный approval path, подготовить заявку и явно зафиксировать блокер, если подача/approval требуют пользовательского аккаунта, бизнес-данных или решения Garmin."
    goal_first_trigger: direct_codex_task
  outcome:
    desired_result: "Garmin Connect Developer Program approval получен Garmin'ом либо текущая Codex-сессия доведена до внешнего submit/approval blocker с готовым пакетом заявки."
    definition_of_done:
      - "Официальный Garmin approval path проверен по актуальным источникам Garmin."
      - "Подготовлен copy-ready текст заявки/ответа для Garmin Developer Program."
      - "Пользователь получил точные внешние шаги для подачи request и сведения, которые нужны для завершения approval."
      - "Если approval не может быть получен Codex самостоятельно, blocker documented as external-user-action and Garmin-decision-boundary."
      - "Repo task artifacts reflect current blocked/external state."
    success_metrics:
      - "Application text clearly states business use, APIs requested, data handling, consent, security posture and non-goals."
      - "No unofficial scraping, credential workarounds or Terms-bypassing path is recommended."
      - "Final answer distinguishes prepared package from actual Garmin approval."
    evidence_required:
      - "Official Garmin Developer Program overview/FAQ/agreement references."
      - "Copy-ready application draft."
      - "External action instructions for Garmin form/portal/contact."
      - "Documented blocker: user account/business details and Garmin approval decision are outside Codex control."
    evidence_sources:
      - "https://developer.garmin.com/gc-developer-program/overview/"
      - "https://developer.garmin.com/gc-developer-program/program-faq/"
      - "https://developerportal.garmin.com/developer-programs/connect-developer-api"
      - "https://developerportal.garmin.com/developer-programs/4/nda-acceptance?dest=%2Fdeveloper-programs%2Fconnect-developer-api"
  boundaries:
    scope:
      - "Garmin Connect Developer Program approval preparation."
      - "Official application path and copy-ready request content."
      - "External blocker documentation."
    non_goals:
      - "Do not submit forms using user identity without credentials and explicit live user action."
      - "Do not bypass Garmin approval, scrape Garmin Connect, reverse engineer APIs or recommend unofficial credential workarounds."
      - "Do not create production integrations or request API keys after approval."
      - "Do not provide legal advice."
    destructive_actions_allowed: false
    production_actions_allowed: false
    secrets_allowed: false
  validation:
    primary_verification_commands:
      - "python3 template-repo/scripts/validate-goal-contract.py .chatgpt/goal-contract.yaml"
      - "python3 template-repo/scripts/validate-codex-work-index.py .chatgpt/codex-work-index.yaml"
      - "git status --short --branch"
    secondary_verification:
      - "Review official Garmin sources for application scope and restrictions."
    proxy_signal_denylist:
      - "tests passed alone"
      - "file exists alone"
      - "commit exists alone"
      - "green dashboard alone"
      - "validator passed alone"
    goal_achievement_rule: "mark achieved only when evidence satisfies DoD, not when proxy signals pass; actual approval requires Garmin written approval or portal access."
  runtime:
    goal_runtime_recommendation: goal_first_contract_only
    codex_goal_live_validation_required: true
    codex_goal_live_validation_evidence: "Current task uses repo goal-first contract only; no /goal runtime switch is claimed for this already-open session."
    tool_feedback_ready: true
    mcp_or_metrics_needed:
      - "official Garmin web sources"
      - "repo validators"
      - "user feedback after Garmin submission"
    observation_cadence: "external follow-up after Garmin response or after two business days from submission"
    budget_guardrails:
      token_budget: ""
      time_budget: ""
      max_iterations: ""
      stop_when:
        - budget_limited
        - tool_limited
        - quota_wall
        - goal_drift
        - unsafe_action
    pause_resume_policy:
      user_controls_lifecycle: true
      model_must_not_clear_or_pause_goal_without_user_instruction: true
  continuation:
    if_budget_limited:
      required_summary:
        - done
        - remaining
        - blockers
        - next recommended goal
    if_unmet:
      create_followup_handoff: false
  side_channel:
    allowed_for_clarifications: true
    must_not_mutate_goal_without_confirmation: true
  closeout:
    goal_status: blocked
    evidence_vs_dod:
      - "Official Garmin sources were checked."
      - "Application draft and user instructions were prepared."
      - "Actual approval remains blocked on user submission/account/business details and Garmin's review decision."
    proxy_signal_closure_used: false
    continuation_summary:
      done:
        - "FT-CX-0040 allocated and self-handoff materialized"
        - "Garmin official approval path checked"
        - "application package prepared"
      remaining:
        - "User submits request through Garmin and returns Garmin response/portal result."
      blockers:
        - "External user action required: Garmin account/form/business identity."
        - "External vendor decision required: Garmin approval."
      next_recommended_goal: "After Garmin approval, create the Garmin integration credential/intake task."
