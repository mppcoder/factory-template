goal_contract:
  version: goal-contract/v1
  goal_id: fix-downstream-closeout-card
  goal_command_source:
    raw_user_goal: "почему опять остановился? и почему если мы делаем новый проект карточку проекта открываешь шаблона?"
    normalized_goal: "Исправить reusable closeout bug: при greenfield/downstream scope финальная карточка проекта должна браться из созданного downstream repo, а не из factory-template dashboard; объяснить остановку и закрыть correction без нового ручного продолжения."
    goal_first_trigger: direct_codex_task
  outcome:
    desired_result: "Factory direct-task closeout rules and renderer selection prevent template card leakage when the completed scope is a generated/downstream project."
    definition_of_done:
      - "Direct-task response completion rule explicitly distinguishes factory-template card from downstream/greenfield repo-local card."
      - "Project-card renderer helper prefers repo-local generated project dashboard before template dashboard."
      - "A regression smoke proves downstream card wins when both downstream and template dashboards exist."
      - "Current closeout uses Health Sync Bridge downstream card for the Health Sync Bridge project scope."
      - "Factory validators pass; repo is clean and pushed or blocker documented."
    success_metrics:
      - "No closeout instruction hardcodes template dashboard as the only valid project card source."
      - "Regression smoke fails if template project name leaks into downstream card selection."
      - "Human-language gate remains green for generated handoff artifacts."
    evidence_required:
      - "FT-CX-0036 route receipt"
      - "Downstream Health Sync Bridge card render output"
      - "template-repo/scripts/codex_task_router.py diff"
      - "template-repo/scripts/verify-all.sh regression smoke"
      - "validate-codex-routing output"
      - "factory quick verify output"
      - "commit/push status"
    evidence_sources:
      - "template-repo/scripts/codex_task_router.py"
      - "template-repo/scripts/create-codex-task-pack.py"
      - "template-repo/scripts/validate-codex-routing.py"
      - "template-repo/scripts/verify-all.sh"
      - "reports/bugs/bug-039-downstream-closeout-card-used-template-dashboard.md"
      - "/projects/health-sync-bridge/.chatgpt/project-lifecycle-dashboard.yaml"
  boundaries:
    scope:
      - "factory-template direct-task closeout/card selection logic"
      - "regression coverage"
      - "bug report and route evidence"
    non_goals:
      - "Do not change Health Sync Bridge product scope or provider integrations."
      - "Do not deploy or request production credentials."
      - "Do not rewrite unrelated lifecycle dashboard content."
    destructive_actions_allowed: false
    production_actions_allowed: false
    secrets_allowed: false
  validation:
    primary_verification_commands:
      - "python3 scripts/render-project-lifecycle-dashboard.py --input .chatgpt/project-lifecycle-dashboard.yaml --format chatgpt-card --stdout in /projects/health-sync-bridge"
      - "python3 template-repo/scripts/validate-codex-routing.py ."
      - "python3 template-repo/scripts/validate-goal-contract.py .chatgpt/goal-contract.yaml"
      - "python3 template-repo/scripts/validate-codex-work-index.py .chatgpt/codex-work-index.yaml"
      - "bash template-repo/scripts/verify-all.sh quick"
    secondary_verification:
      - "git status --short --branch"
    proxy_signal_denylist:
      - "tests passed alone"
      - "file exists alone"
      - "commit exists alone"
      - "green dashboard alone"
      - "validator passed alone"
    goal_achievement_rule: "mark achieved only when evidence satisfies DoD, not when proxy signals pass"
  runtime:
    goal_runtime_recommendation: goal_first_contract_only
    codex_goal_live_validation_required: true
    codex_goal_live_validation_evidence: "Current task uses repo goal-first contract only; no /goal runtime switch is claimed for this already-open session."
    tool_feedback_ready: true
    mcp_or_metrics_needed:
      - "repo validators"
      - "downstream card render"
      - "regression smoke"
      - "git sync status"
    observation_cadence: "operator check every 15-20 minutes for long goal loops"
    budget_guardrails:
      token_budget: ""
      time_budget: ""
      max_iterations: ""
      stop_when:
        - budget_limited
        - tool_limited
        - quota_wall
        - goal_drift
        - unsafe_action
    pause_resume_policy:
      user_controls_lifecycle: true
      model_must_not_clear_or_pause_goal_without_user_instruction: true
  continuation:
    if_budget_limited:
      required_summary:
        - done
        - remaining
        - blockers
        - next recommended goal
    if_unmet:
      create_followup_handoff: true
  side_channel:
    allowed_for_clarifications: true
    must_not_mutate_goal_without_confirmation: true
  closeout:
    goal_status: achieved
    evidence_vs_dod:
      - "Direct-task response completion rule now distinguishes factory-template and downstream/greenfield repo-local project cards."
      - "render_project_card_for_codex_response now prefers repo-local generated project dashboard before template dashboard."
      - "downstream_project_card_selection smoke passes and proves template card does not leak when both dashboards exist."
      - "Health Sync Bridge card renders from /projects/health-sync-bridge with project name Health Sync Bridge."
      - "Routing, task-pack, work-index and human-language validators pass before factory quick verification."
    proxy_signal_closure_used: false
    continuation_summary:
      done:
        - "downstream closeout card rule fixed"
        - "renderer candidate order fixed"
        - "regression smoke added"
      remaining: []
      blockers: []
      next_recommended_goal: ""
