goal_contract:
  version: goal-contract/v1
  goal_id: continue-internal-followup-bug
  goal_command_source:
    raw_user_goal: "а почему остановка? продолжай все шаги без остановки и пофиксь этот баг"
    normalized_goal: "Исправить преждевременную остановку на пользовательском next step, починить reusable guided-launcher path bug, затем продолжить внутренние Health Sync Bridge шаги до реальных внешних blockers."
    goal_first_trigger: direct_codex_task
  outcome:
    desired_result: "Factory-template не создает downstream project внутри factory repo при canonical VPS запуске, generated deploy dry-run работает в downstream repo, а Health Sync Bridge получает первый внутренний implementation scaffold без ожидания ручного продолжения."
    definition_of_done:
      - "Factory launcher route-only из /projects/factory-template показывает /projects/<slug> как target."
      - "Wizard поддерживает explicit --project-base and preserves smoke/custom base behavior."
      - "Generated deploy-dry-run can find repo-local scripts/validate-operator-env.py."
      - "Health Sync Bridge has internal scaffolds for Withings OAuth, Garmin approval blocker, normalized store, dashboard, audit redaction and export fallback."
      - "Factory and downstream validators pass; both repos are clean and pushed or blocker documented."
    success_metrics:
      - "No untracked nested downstream repo remains in factory-template."
      - "Downstream smoke and deploy dry-run pass."
      - "Factory route-only regression passes."
    evidence_required:
      - "FT-CX-0035 route receipt"
      - "factory launcher route-only output"
      - "wizard explicit project-base route-only output"
      - "Health Sync Bridge smoke output"
      - "Health Sync Bridge deploy dry-run output"
      - "quick verify outputs"
      - "commit/push status"
    evidence_sources:
      - "template-repo/scripts/factory-launcher.py"
      - "template-repo/scripts/first-project-wizard.py"
      - "template-repo/scripts/deploy-dry-run.sh"
      - "template-repo/scripts/verify-all.sh"
      - "/projects/health-sync-bridge/src/health_sync_bridge"
      - "/projects/health-sync-bridge/scripts/health-sync-bridge-smoke.py"
  boundaries:
    scope:
      - "factory-template launcher/deploy-dry-run bugfix"
      - "Health Sync Bridge internal implementation scaffold"
      - "validators and verified sync"
    non_goals:
      - "Do not enter real Withings/Garmin secrets."
      - "Do not claim Garmin approval."
      - "Do not deploy production service with real health data."
    destructive_actions_allowed: false
    production_actions_allowed: false
    secrets_allowed: false
  validation:
    primary_verification_commands:
      - "python3 template-repo/scripts/factory-launcher.py --mode greenfield --project-name \"Canonical Root Smoke\" --project-slug canonical-root-smoke --route-only"
      - "python3 template-repo/scripts/validate-codex-work-index.py .chatgpt/codex-work-index.yaml"
      - "python3 template-repo/scripts/validate-goal-contract.py .chatgpt/goal-contract.yaml"
      - "bash template-repo/scripts/verify-all.sh quick"
      - "python3 scripts/health-sync-bridge-smoke.py in /projects/health-sync-bridge"
      - "bash scripts/deploy-dry-run.sh in /projects/health-sync-bridge"
      - "bash scripts/verify-all.sh quick in /projects/health-sync-bridge"
    secondary_verification:
      - "git status --short --branch in both repos"
    proxy_signal_denylist:
      - "tests passed alone"
      - "file exists alone"
      - "commit exists alone"
      - "green dashboard alone"
      - "validator passed alone"
    goal_achievement_rule: "mark achieved only when evidence satisfies DoD, not when proxy signals pass"
  runtime:
    goal_runtime_recommendation: goal_first_contract_only
    codex_goal_live_validation_required: true
    codex_goal_live_validation_evidence: "Current task uses repo goal-first contract only; no /goal runtime switch is claimed for this already-open session."
    tool_feedback_ready: true
    mcp_or_metrics_needed:
      - "repo validators"
      - "route-only launcher output"
      - "downstream smoke"
      - "deploy dry-run"
      - "git sync status"
    observation_cadence: "operator check every 15-20 minutes for long goal loops"
    budget_guardrails:
      token_budget: ""
      time_budget: ""
      max_iterations: ""
      stop_when:
        - budget_limited
        - tool_limited
        - quota_wall
        - goal_drift
        - unsafe_action
    pause_resume_policy:
      user_controls_lifecycle: true
      model_must_not_clear_or_pause_goal_without_user_instruction: true
  continuation:
    if_budget_limited:
      required_summary:
        - done
        - remaining
        - blockers
        - next recommended goal
    if_unmet:
      create_followup_handoff: true
  side_channel:
    allowed_for_clarifications: true
    must_not_mutate_goal_without_confirmation: true
  closeout:
    goal_status: achieved
    evidence_vs_dod:
      - "Factory launcher target root and wizard project-base behavior fixed."
      - "Generated deploy dry-run validator fallback fixed."
      - "Health Sync Bridge internal implementation scaffold added."
      - "Verification and sync completed."
    proxy_signal_closure_used: false
    continuation_summary:
      done:
        - "factory bug fixed"
        - "downstream internal scaffold continued"
      remaining:
        - "real external credentials and approvals only"
      blockers:
        - "Garmin Developer Program approval"
        - "real Withings OAuth credentials"
        - "production domain/TLS and encrypted health-data storage approval"
      next_recommended_goal: "continue with real Withings OAuth credentials or Garmin approval when available"
