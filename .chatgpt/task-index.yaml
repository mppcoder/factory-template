change:
  id: "chg-20260421-004"
  title: "Fix internal follow-up closeout classification"
  class: "small-fix"
  execution_mode: "single-pass"
  type: "brownfield"
  status: "done"
  priority: "medium"
  summary: "Исправить reusable process gap, из-за которого internal repo follow-up после remediation/push мог ошибочно классифицироваться как user-only closeout."
  outputs:
    - "template-repo/scenario-pack/00-master-router.md"
    - "template-repo/scenario-pack/02-decision-policy.md"
    - "template-repo/scenario-pack/15-handoff-to-codex.md"
    - "template-repo/scenario-pack/16-done-closeout.md"
    - "template-repo/scripts/create-codex-task-pack.sh"
    - "template-repo/scripts/validate-codex-task-pack.sh"

tasks:
  - id: "T-001"
    title: "Зафиксировать internal vs external follow-up rule"
    type: "implementation"
    risk_level: "medium"
    executor: "developer"
    depends_on: []
    outputs:
      - "template-repo/scenario-pack/00-master-router.md"
      - "template-repo/scenario-pack/01-global-rules.md"
      - "template-repo/scenario-pack/02-decision-policy.md"
      - "template-repo/scenario-pack/15-handoff-to-codex.md"
      - "template-repo/scenario-pack/16-done-closeout.md"
      - "template-repo/process/bug-handling-policy.md"
      - "template-repo/process/definition-of-done.bugfix-feature-change.md"
    acceptance:
      - "internal repo follow-up не переводится в user-only closeout"
      - "mixed follow-up требует handoff first, footer second"
      - "done_complete блокируется, пока внутренний release-followup внутри repo не закрыт"

  - id: "T-002"
    title: "Синхронизировать runbook, AGENTS и manifests"
    type: "documentation"
    risk_level: "low"
    executor: "editor"
    depends_on:
      - "T-001"
    outputs:
      - "factory_template_only_pack/01-runbook-dlya-polzovatelya-factory-template.md"
      - "factory_template_only_pack/02-runbook-dlya-codex-factory-template.md"
      - "factory_template_only_pack/03-mode-routing-factory-template.md"
      - "factory_template_only_pack/07-AGENTS-factory-template.md"
      - "template-repo/policy-presets.yaml"
      - "template-repo/change-classes.yaml"
    acceptance:
      - "runbook и AGENTS одинаково различают internal repo follow-up и external boundary"
      - "footer `Инструкция пользователю` не вытесняет внутренний handoff"

  - id: "T-003"
    title: "Усилить codex-task-pack generation и validation"
    type: "implementation"
    risk_level: "medium"
    executor: "developer"
    depends_on:
      - "T-001"
    outputs:
      - "template-repo/scripts/create-codex-task-pack.sh"
      - "template-repo/scripts/validate-codex-task-pack.sh"
      - "factory_template_only_pack/templates/factory-template-boundary-actions.template.md"
    acceptance:
      - "boundary-actions не маркирует internal repo follow-up как внешнюю границу"
      - "validator проверяет, что handoff не пропадает при internal follow-up"
