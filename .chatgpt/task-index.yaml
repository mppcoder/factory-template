change:
  id: FT-CX-0031-close-unfinished-repo-tasks
  title: Close unfinished repo task state
  class: small-fix
  execution_mode: hybrid
  summary: "Закрыть stale open ChatGPT reservations, текущий Codex self-handoff и перерендерить project card/dashboard."

tasks:
  - id: T-001
    title: Пройти direct-task self-handoff
    type: routing
    risk_level: medium
    executor: developer
    status: done
    outputs:
      - .chatgpt/codex-work-index.yaml
      - .chatgpt/task-launch.yaml
      - .chatgpt/direct-task-self-handoff.md
    acceptance:
      - FT-CX-0031 is materialized before closeout
  - id: T-002
    title: Закрыть stale open ChatGPT reservations
    type: closeout
    risk_level: medium
    executor: developer
    status: done
    depends_on:
      - T-001
    outputs:
      - .chatgpt/chat-handoff-index.yaml
    acceptance:
      - FT-CH-0017, FT-CH-0019, FT-CH-0023 and FT-CH-0025 are verified or otherwise terminal
  - id: T-003
    title: Verify and refresh project card
    type: verification
    risk_level: medium
    executor: developer
    status: done
    depends_on:
      - T-002
    outputs:
      - .chatgpt/verification-report.md
      - .chatgpt/done-report.md
      - reports/project-status-card.md
      - reports/project-lifecycle-dashboard.md
    acceptance:
      - chat/codex indexes have no non-terminal unfinished items
      - quick verify passes
