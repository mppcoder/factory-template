    в picker и затем вставить handoff.'
  executable_switch_rule: 'Строго воспроизводимое executable-переключение в live Codex
    для этого repo: явный новый task launch через launcher и selected_profile.'
  strict_launch_rule: Launcher-first path остается опциональным строгим режимом для
    автоматизации, воспроизводимости, запуска из shell и scripted launch.
  live_session_fallback_rule: Уже открытая live session не является надежным механизмом
    автопереключения profile/model/reasoning и допустима только как неканонический
    fallback.
  model_expectation_rule: selected_model и selected_reasoning_effort фиксируют repo-configured
    mapping выбранного executable profile; live availability подтверждается отдельной
    проверкой `codex debug models`, а advisory handoff text сам по себе ничего не
    переключает.
  model_catalog_status: available
  model_catalog_last_checked_utc: '2026-04-25T18:26:17Z'
  model_catalog_validation_note: selected_model совпадает с последним сохраненным
    snapshot repo catalog; перед внешними обещаниями повторите live catalog check
  advisory_layers:
  - AGENTS.md / AGENT.md
  - ChatGPT Project instructions
  - scenario-pack
  - .chatgpt docs и handoff guidance
  executable_layers:
  - codex-model-routing.yaml
  - scripts/resolve-codex-task-route.py
  - scripts/bootstrap-codex-task.py
  - scripts/check-codex-model-catalog.py
  - scripts/launch-codex-task.sh
  - .codex/config.toml с именованными profiles
  launch_artifact_path: .chatgpt/codex-input.md
  launch_command: ./scripts/launch-codex-task.sh --launch-source chatgpt-handoff --task-file
    .chatgpt/codex-input.md --execute
  codex_profile_command: codex --profile deep
  strict_launch_use_cases:
  - автоматизация
  - воспроизводимость
  - запуск из shell
  - scripted launch
  troubleshooting:
  - Если вы работаете через VS Code Codex extension интерактивно, используйте новый
    чат/окно, вручную выставьте selected_model и selected_reasoning_effort в picker,
    а затем вставьте handoff.
  - Новый чат + вставка handoff и новый task launch через executable launcher — не
    одно и то же; не выдавайте manual UI apply за auto-switch.
  - 'Если handoff вставлен в уже открытую или случайную Codex chat-сессию без ручной
    проверки picker, это неканонический путь: route может остаться устаревшим.'
  - Если нужна строгая воспроизводимость, автоматизация или запуск из shell, используйте
    optional strict launch_command.
  - Если после launch или manual UI apply виден sticky last-used profile/model/reasoning,
    закройте текущую сессию, откройте новую и при необходимости выполните launch_command,
    затем проверьте именованный profile в local Codex config.
  - Если selected_model отсутствует в live catalog, обновите codex-routing.yaml или
    local profile mapping, прежде чем обещать этот model ID пользователю.
  - Если новый model ID появился в live catalog, сначала создайте proposal через `scripts/check-codex-model-catalog.py
    --write-proposal`; promotion profile mapping требует ручного review.
  direct_self_handoff_required: false
  direct_self_handoff_completed: false
  requested_task_class: downstream-sync-validation
  requested_selected_profile: deep
  requested_selected_model: gpt-5.5
  requested_selected_reasoning_effort: high
