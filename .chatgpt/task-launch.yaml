launch:
  timestamp_utc: '2026-04-25T07:38:19+00:00'
  launch_unit: new-task-launch
  launch_source: direct-task
  router_layer: executable
  task_class: review
  task_class_reasons:
  - 'explicit task class override: review'
  - 'explicit reasoning/model override matched default profile: review'
  selected_profile: review
  selected_model: gpt-5.4
  selected_reasoning_effort: high
  selected_plan_mode_reasoning_effort: high
  apply_mode: manual-ui
  strict_launch_mode: optional
  project_profile: factory-template
  selected_scenario: 16-done-closeout.md + 17-direct-task-self-handoff.md
  pipeline_stage: closeout sync
  artifacts_to_update:
  - .chatgpt/task-launch.yaml
  - .chatgpt/direct-task-self-handoff.md
  - .chatgpt/direct-task-response.md
  - git commit
  - origin/main
  handoff_allowed: 'yes'
  defect_capture_path: not-required-by-text-signal
  task_summary: 'classification: direct-task'
  launch_boundary_rule: Выбор модели и reasoning mode считается надежным только на
    новом запуске Codex для новой задачи.
  interactive_default_rule: 'Для интерактивной работы в VS Code Codex extension основной
    user-facing path: открыть новое окно/чат Codex, вручную выбрать model/reasoning
    в picker и затем вставить handoff.'
  executable_switch_rule: 'Строго воспроизводимый executable switch в live Codex для
    этого repo: явный новый task launch через launcher и selected_profile.'
  strict_launch_rule: Launcher-first path остается optional strict mode для automation,
    reproducibility, shell-first и scripted launch.
  live_session_fallback_rule: Уже открытая live session не является надежным механизмом
    автопереключения profile/model/reasoning и допустима только как non-canonical
    fallback.
  model_expectation_rule: selected_model и selected_reasoning_effort фиксируют ожидаемую
    конфигурацию выбранного executable profile; advisory handoff text сам по себе
    ничего не переключает.
  advisory_layers:
  - AGENTS.md / AGENT.md
  - ChatGPT Project Instructions
  - scenario-pack
  - .chatgpt docs и handoff guidance
  executable_layers:
  - scripts/resolve-codex-task-route.py
  - scripts/bootstrap-codex-task.py
  - scripts/launch-codex-task.sh
  - .codex/config.toml named profiles
  launch_artifact_path: .chatgpt/direct-task-source.md
  launch_command: ./scripts/launch-codex-task.sh --launch-source direct-task --task-file
    .chatgpt/direct-task-source.md --execute
  codex_profile_command: codex --profile review
  strict_launch_use_cases:
  - automation
  - reproducibility
  - shell-first
  - scripted launch
  troubleshooting:
  - Если вы работаете через VS Code Codex extension интерактивно, используйте новый
    чат/окно, вручную выставьте selected_model и selected_reasoning_effort в picker,
    а затем вставьте handoff.
  - Новый чат + вставка handoff и новый task launch через executable launcher — не
    одно и то же; не выдавайте manual UI apply за auto-switch.
  - 'Если handoff вставлен в уже открытую или случайную Codex chat-сессию без ручной
    проверки picker, это non-canonical path: route может остаться stale.'
  - Если нужна строгая воспроизводимость, automation или shell-first запуск, используйте
    optional strict launch_command.
  - Если после launch или manual UI apply виден sticky last-used profile/model/reasoning,
    закройте текущую сессию, откройте новую и при необходимости выполните launch_command,
    затем проверьте named profile в local Codex config.
  - Если selected_model отсутствует в live catalog, обновите codex-routing.yaml или
    local profile mapping, прежде чем обещать этот model ID пользователю.
  direct_self_handoff_required: true
  direct_self_handoff_completed: true
  requested_task_class: null
  requested_selected_profile: null
  requested_selected_model: null
  requested_selected_reasoning_effort: null
