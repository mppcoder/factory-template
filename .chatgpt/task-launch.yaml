launch:
  timestamp_utc: '2026-04-22T17:15:28+00:00'
  launch_unit: new-task-launch
  launch_source: chatgpt-handoff
  router_layer: executable
  task_class: review
  task_class_reasons:
  - 'keyword hit: test'
  - 'keyword hit: провер'
  - 'explicit reasoning/model override matched default profile: review'
  selected_profile: review
  selected_model: gpt-5.4
  selected_reasoning_effort: high
  selected_plan_mode_reasoning_effort: high
  project_profile: unknown-project-profile
  selected_scenario: 00-master-router.md
  pipeline_stage: done
  artifacts_to_update:
  - .chatgpt/codex-input.md
  - .chatgpt/codex-context.md
  - .chatgpt/codex-task-pack.md
  - .chatgpt/verification-report.md
  - .chatgpt/done-report.md
  handoff_allowed: yes (forbidden)
  defect_capture_path: not-required-by-text-signal
  task_summary: '# Входной пакет для Codex'
  launch_boundary_rule: Выбор модели и reasoning mode считается надежным только на
    новом запуске Codex для новой задачи.
  executable_switch_rule: 'Надежно исполняемый switch в live Codex для этого repo:
    явный новый task launch через launcher и selected_profile.'
  model_expectation_rule: selected_model и selected_reasoning_effort фиксируют ожидаемую
    конфигурацию выбранного executable profile; advisory handoff text сам по себе
    ничего не переключает.
  advisory_layers:
  - AGENTS.md / AGENT.md
  - ChatGPT Project Instructions
  - scenario-pack
  - .chatgpt docs и handoff guidance
  executable_layers:
  - scripts/resolve-codex-task-route.py
  - scripts/bootstrap-codex-task.py
  - scripts/launch-codex-task.sh
  - .codex/config.toml named profiles
  launch_artifact_path: .chatgpt/codex-input.md
  launch_command: ./scripts/launch-codex-task.sh --launch-source chatgpt-handoff --task-file
    .chatgpt/codex-input.md --execute
  codex_profile_command: codex --profile review
  troubleshooting:
  - 'Если handoff вставлен в уже открытую или случайную Codex chat-сессию, это non-canonical
    path: завершите сессию и выполните новый task launch.'
  - Если после launch виден sticky last-used profile/model/reasoning, снова выполните
    launch_command и проверьте named profile в local Codex config.
  - Если selected_model отсутствует в live catalog, обновите codex-routing.yaml или
    local profile mapping, прежде чем обещать этот model ID пользователю.
  direct_self_handoff_required: false
  direct_self_handoff_completed: false
  requested_task_class: null
  requested_selected_profile: null
  requested_selected_model: null
  requested_selected_reasoning_effort: null
