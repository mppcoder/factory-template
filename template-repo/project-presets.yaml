    - Подходит для продуктовой разработки, где ожидается реализация и последующая
      верификация.
    - Core parity layer совпадает с остальными generated modes; отличия ограничены
      greenfield discovery artifacts.
    - Это steady-state preset для новых проектов и для проектов, успешно принятых
      из brownfield transition.

