mode_parity:
  manifest: mode-parity.yaml
  core_capabilities:
  - repo_first_instructions
  - scenario_pack_access
  - agents_materialization
  - chatgpt_task_artifacts
  - codex_handoff_pack
  - defect_capture_path
  - versioning_documentation_layer
  - project_knowledge_layer
  - work_features_and_completed
  - verify_done_checklist
  - downstream_sync_metadata

