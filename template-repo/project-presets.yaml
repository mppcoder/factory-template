    - Core parity layer совпадает с остальными generated modes; отличия ограничены
      evidence-first и modernization artifacts.
    - Это transitional adoption preset; после успешной модернизации active profile
      должен переключиться на `greenfield-product`.
    - Brownfield документы остаются историей/evidence и не управляют active mode после
      conversion.

