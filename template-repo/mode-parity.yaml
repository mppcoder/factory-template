mode_parity_version: 1
status: active
owner: factory-template
description: "Core parity contract for template and generated project modes."

lifecycle_state_model:
  distinction: "project_preset and recommended_mode are launch/profile choices; lifecycle_state records the current transition state."
  states:
    greenfield-active:
      rule: "Normal active product development."
      final_state: true
    brownfield-without-repo-intake:
      rule: "Evidence collection only; no normalized repo exists yet."
      transitional: true
    brownfield-without-repo-reconstruction:
      rule: "Create or identify a canonical repo root."
      transitional: true
    brownfield-with-repo-audit:
      rule: "Map existing code, risks, constraints and safe zones."
      transitional: true
    brownfield-with-repo-adoption:
      rule: "Apply factory core and safe structure fixes without overwriting product code."
      transitional: true
    brownfield-to-greenfield-conversion:
      rule: "Update active profile to greenfield-product."
      transitional: true
    greenfield-converted:
      rule: "Final steady state after successful brownfield adoption."
      final_state: true
  conversion_done_rule: "Brownfield adoption is done only after conversion to greenfield-product or a documented blocker."

conversion_gates:
  - repo_first_core_present
  - master_router_present
  - scenario_pack_accessible
  - active_project_profile_updated_to_greenfield_product
  - lifecycle_state_greenfield_converted
  - greenfield_required_artifacts_present
  - brownfield_evidence_archived_or_referenced
  - project_owned_zones_protected
  - template_owned_zones_marked
  - sync_manifest_safe_for_downstream
  - validators_green

core_capability_ids: &core_capability_ids
  - repo_first_instructions
  - scenario_pack_access
  - agents_materialization
  - chatgpt_task_artifacts
  - codex_handoff_pack
  - defect_capture_path
  - versioning_documentation_layer
  - project_knowledge_layer
  - work_features_and_completed
  - verify_done_checklist
  - downstream_sync_metadata

all_presets_required_artifacts: &all_presets_required_artifacts
  - AGENTS.md
  - template-repo/scenario-pack/00-master-router.md
  - template-repo/mode-parity.yaml
  - .chatgpt/project-profile.yaml
  - .chatgpt/task-index.yaml
  - .chatgpt/task-state.yaml
  - .chatgpt/stage-state.yaml
  - .chatgpt/active-scenarios.yaml
  - .chatgpt/direct-task-self-handoff.md
  - .chatgpt/codex-input.md
  - .chatgpt/normalized-codex-handoff.md
  - .chatgpt/bugflow-status.yaml
  - .chatgpt/project-origin.md
  - .chatgpt/done-checklist.md
  - .chatgpt/verification-report.md
  - .chatgpt/done-report.md
  - tasks/codex/codex-task-mandatory-bug-capture.block.md
  - reports/bugs
  - reports/learnings
  - meta-feedback/factory-bug-report.md
  - VERSION.md
  - CHANGELOG.md
  - CURRENT_FUNCTIONAL_STATE.md
  - docs/architecture.md
  - docs/codex-workflow.md
  - project-knowledge/README.md
  - work/features
  - work/completed
  - project-presets.yaml
  - policy-presets.yaml
  - compatibility-aliases.yaml
  - codex-routing.yaml
