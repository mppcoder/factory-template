mode_specific_capabilities:
  greenfield_discovery:
    title: Greenfield discovery artifacts
    justification: "Only greenfield mode needs first-principles vision, problem and initial scope discovery."
    required_paths:
      - greenfield/vision.md
      - greenfield/problem-statement.md
      - greenfield/scope-v1.md
      - greenfield/architecture-options.md
      - greenfield/initial-task-list.md
      - .chatgpt/discovery-summary.md
  greenfield_conversion_readiness:
    title: Greenfield conversion artifacts
    justification: "Converted brownfield projects must expose the same greenfield product discovery surface and preserve brownfield history."
    required_paths:
      - greenfield/vision.md
      - greenfield/problem-statement.md
      - greenfield/scope-v1.md
      - greenfield/architecture-options.md
      - greenfield/initial-task-list.md
      - brownfield/system-inventory.md
      - brownfield/gap-register.md
  brownfield_evidence_first:
    title: Brownfield evidence-first artifacts
    justification: "All brownfield modes must capture observed system facts before implementation."
    required_paths:
      - brownfield/system-inventory.md
      - brownfield/repo-audit.md
      - brownfield/as-is-architecture.md
      - brownfield/gap-register.md
      - .chatgpt/evidence-register.md
      - .chatgpt/reality-check.md
  brownfield_without_repo_reconstruction:
    title: Brownfield without repo reconstruction workspace
    justification: "No-repo brownfield needs reconstruction and incoming-evidence flow before safe Codex work."
    required_paths:
      - brownfield/reverse-engineering-plan.md
      - brownfield/reverse-engineering-summary.md
      - brownfield/decision-log.md
      - .chatgpt/codex-input.md
  brownfield_with_repo_modernization:
    title: Brownfield with repo modernization paths
    justification: "Modernization needs audit, change-map and risk paths for a real existing repo."
    required_paths:
      - brownfield/change-map.md
      - brownfield/risks-and-constraints.md
      - .chatgpt/conflict-report.md
  brownfield_with_repo_integration:
    title: Brownfield with repo integration paths
    justification: "Integration mode needs explicit dependency and integration documentation."
    required_paths:
      - docs/integrations.md
      - .chatgpt/reality-check.md
      - .chatgpt/tech-spec.md
  brownfield_with_repo_audit:
    title: Brownfield with repo audit paths
    justification: "Audit mode needs gap and evidence outputs without requiring immediate implementation handoff."
    required_paths:
      - brownfield/gap-register.md
      - .chatgpt/evidence-register.md
      - .chatgpt/done-report.md

modes:
  template-base:
    kind: template
    presets: []
    core_capabilities: *core_capability_ids
    allowed_differences: []
    required_paths:
      - README.md
      - .chatgpt/task-index.yaml
      - .chatgpt/task-state.yaml
      - .chatgpt/active-scenarios.yaml
      - .chatgpt/codex-input.md
      - .chatgpt/done-checklist.md
      - brownfield/system-inventory.md
      - greenfield/vision.md
      - project-knowledge/README.md
      - work/features
      - work/completed
  greenfield:
    kind: generated
    presets:
      - greenfield-product
    lifecycle_states:
      - greenfield-active
      - greenfield-converted
    target_lifecycle_state: greenfield-active
    core_capabilities: *core_capability_ids
    allowed_differences:
      - greenfield_discovery
  brownfield-without-repo:
    kind: generated
    transitional: true
    presets:
      - brownfield-without-repo
    lifecycle_states:
      - brownfield-without-repo-intake
      - brownfield-without-repo-reconstruction
      - brownfield-to-greenfield-conversion
    target_project_preset: greenfield-product
    target_lifecycle_state: greenfield-converted
    conversion_required: true
    core_capabilities: *core_capability_ids
    allowed_differences:
      - brownfield_evidence_first
      - brownfield_without_repo_reconstruction
  brownfield-with-repo-modernization:
    kind: generated
    transitional: true
    presets:
      - brownfield-with-repo-modernization
    lifecycle_states:
      - brownfield-with-repo-audit
      - brownfield-with-repo-adoption
      - brownfield-to-greenfield-conversion
    target_project_preset: greenfield-product
    target_lifecycle_state: greenfield-converted
    conversion_required: true
    core_capabilities: *core_capability_ids
    allowed_differences:
      - brownfield_evidence_first
      - brownfield_with_repo_modernization
  brownfield-with-repo-integration:
    kind: generated
    transitional: true
    presets:
      - brownfield-with-repo-integration
    lifecycle_states:
      - brownfield-with-repo-audit
      - brownfield-with-repo-adoption
      - brownfield-to-greenfield-conversion
    target_project_preset: greenfield-product
    target_lifecycle_state: greenfield-converted
    conversion_required: true
    core_capabilities: *core_capability_ids
    allowed_differences:
      - brownfield_evidence_first
      - brownfield_with_repo_integration
  brownfield-with-repo-audit:
    kind: generated
    transitional: true
    presets:
      - brownfield-with-repo-audit
    lifecycle_states:
      - brownfield-with-repo-audit
      - brownfield-with-repo-adoption
      - brownfield-to-greenfield-conversion
    target_project_preset: greenfield-product
    target_lifecycle_state: greenfield-converted
    conversion_required: true
    core_capabilities: *core_capability_ids
    allowed_differences:
      - brownfield_evidence_first
      - brownfield_with_repo_audit
