    title: Repo-first instructions
    justification: "Every project must start from repository instructions and the master router."
    generated_paths:
      - AGENTS.md
    source_paths:
      - template-repo/AGENTS.md
      - template-repo/scripts/sync-agents.py
  scenario_pack_access:
    title: Scenario-pack access
    justification: "Every generated project carries the scenario router and scenario pack entrypoint."
    generated_paths:
      - template-repo/scenario-pack/00-master-router.md
    source_paths:
      - template-repo/scenario-pack/00-master-router.md
      - template-repo/scripts/export-scenario-pack.sh
  agents_materialization:
    title: AGENTS materialization
    justification: "Generated AGENTS.md must be materialized from template-repo/AGENTS.md, not handwritten per mode."
    generated_paths:
      - AGENTS.md
    source_paths:
      - template-repo/AGENTS.md
      - template-repo/scripts/sync-agents.py
  chatgpt_task_artifacts:
