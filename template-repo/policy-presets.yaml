    - Если change затрагивает repo-first instruction layer или downstream template consumers, `Инструкция пользователю` должна быть расширена до completion package с affected contours, delete-before-replace и repo-level sync steps.
  brownfield-stabilization:
    default_scenarios:
    - 00-master-router.md
    - brownfield/00-brownfield-entry.md
    - brownfield/01-system-inventory.md
    - brownfield/03-as-is-architecture-map.md
    - brownfield/08-brownfield-risk-review.md
    - brownfield/10-evidence-pack-completion.md
    - brownfield/11-codex-assisted-stabilization.md
    - 15-handoff-to-codex.md
    minimum_evidence:
      required_all:
      - '[PROJECT]'
      required_any:
      - '[DOC]'
      - '[REAL]'
      - '[FIX]'
    codex_handoff:
      manual: forbidden
      hybrid: optional
      codex-led: required
    notes:
    - До завершения evidence pack handoff должен оставаться optional.
    - После фиксации safe zones и rollback плана можно переходить в codex-led.
    - Brownfield без repo является transitional intake/reconstruction path; done
      допустим только после normalized repo плюс with-repo adoption или явного blocker.
    - "Successful adoption завершается `project_preset: greenfield-product` и `lifecycle_state: greenfield-converted`."
    - Для codex-led отсутствие inline handoff в том же ответе запрещено.
    - Если есть pending user action или external step, финальная секция `Инструкция пользователю` обязательна.
    - Internal repo follow-up не должен подменяться user-only closeout; для mixed follow-up сначала нужен inline handoff, затем user footer только для внешней границы.
    - Если verify green, `origin` настроен и canonical verified sync доступен, commit/push выполняются самим Codex через canonical sync path и не должны запрашиваться у пользователя как отдельное ручное подтверждение.
    - Если change затрагивает repo-first instruction layer или downstream template consumers, `Инструкция пользователю` должна быть расширена до completion package с affected contours, delete-before-replace и repo-level sync steps.
