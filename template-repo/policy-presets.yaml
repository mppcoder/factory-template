policy_presets:
  small-fix:
    default_scenarios:
    - 00-master-router.md
    - 02-decision-policy.md
    - 12-bug-analysis.md
    - 14-docs-normalization.md
    minimum_evidence:
      required_all:
      - '[PROJECT]'
      - '[DOC]'
      required_any:
      - '[FIX]'
      - '[REAL]'
    codex_handoff:
      manual: forbidden
      hybrid: optional
      codex-led: forbidden
    notes:
    - Используйте для небольших исправлений без масштабной перестройки системы.
    - Если handoff уже разрешен и задача достаточно определена, выдать inline handoff в том же ответе; если нужен следующий шаг пользователя, завершить ответ блоком `Инструкция пользователю`.
  feature:
    default_scenarios:
    - 00-master-router.md
    - 05-clarify-scope.md
    - 06-user-spec-generation.md
    - 08-tech-spec-generation.md
    - 10-task-decomposition.md
    - 15-handoff-to-codex.md
    minimum_evidence:
      required_all:
      - '[PROJECT]'
      - '[DOC]'
      required_any:
      - '[REAL]'
      - '[FIX]'
    codex_handoff:
      manual: forbidden
      hybrid: required
      codex-led: required
    notes:
    - Для новой функции обязательны spec, decomposition и verify.
    - Для change-class с required handoff отсутствие inline handoff в том же ответе запрещено.
    - Если есть pending user action или external step, финальная секция `Инструкция пользователю` обязательна.
  refactor:
    default_scenarios:
    - 00-master-router.md
    - 02-decision-policy.md
    - 13-refactor-analysis.md
    - 10-task-decomposition.md
    - 15-handoff-to-codex.md
    minimum_evidence:
      required_all:
      - '[PROJECT]'
      required_any:
      - '[DOC]'
      - '[REAL]'
      - '[FIX]'
    codex_handoff:
      manual: optional
      hybrid: required
      codex-led: required
    notes:
    - Рефакторинг нельзя делать без conflict detection.
    - Для change-class с required handoff отсутствие inline handoff в том же ответе запрещено.
    - Если есть pending user action или external step, финальная секция `Инструкция пользователю` обязательна.
  migration:
    default_scenarios:
    - 00-master-router.md
    - 02-decision-policy.md
    - 08-tech-spec-generation.md
    - 10-task-decomposition.md
    - 15-handoff-to-codex.md
    minimum_evidence:
      required_all:
      - '[PROJECT]'
      - '[DOC]'
      required_any:
      - '[REAL]'
      - '[ASSUMPTION]'
    codex_handoff:
      manual: forbidden
      hybrid: required
      codex-led: required
    notes:
    - Для миграций обязательно фиксируйте риски совместимости.
    - Для change-class с required handoff отсутствие inline handoff в том же ответе запрещено.
    - Если есть pending user action или external step, финальная секция `Инструкция пользователю` обязательна.
  brownfield-audit:
    default_scenarios:
    - 00-master-router.md
    - brownfield/00-brownfield-entry.md
    - brownfield/01-system-inventory.md
    - brownfield/02-repo-audit.md
    - brownfield/04-gap-register.md
    minimum_evidence:
      required_all:
      - '[PROJECT]'
      required_any:
      - '[DOC]'
      - '[REAL]'
      - '[FIX]'
    codex_handoff:
      manual: forbidden
      hybrid: optional
      codex-led: forbidden
    notes:
    - Аудит может завершаться без handoff в Codex, если цель — инвентаризация и нормализация.
    - Если handoff все же уже разрешен и задача достаточно определена, по умолчанию выдать inline handoff в том же ответе.
    - Если есть pending user action или external step, финальная секция `Инструкция пользователю` обязательна.
  brownfield-stabilization:
    default_scenarios:
    - 00-master-router.md
    - brownfield/00-brownfield-entry.md
    - brownfield/01-system-inventory.md
    - brownfield/03-as-is-architecture-map.md
    - brownfield/08-brownfield-risk-review.md
    - brownfield/10-evidence-pack-completion.md
    - brownfield/11-codex-assisted-stabilization.md
    - 15-handoff-to-codex.md
    minimum_evidence:
      required_all:
      - '[PROJECT]'
      required_any:
      - '[DOC]'
      - '[REAL]'
      - '[FIX]'
    codex_handoff:
      manual: forbidden
      hybrid: optional
      codex-led: required
    notes:
    - До завершения evidence pack handoff должен оставаться optional.
    - После фиксации safe zones и rollback плана можно переходить в codex-led.
    - Для codex-led отсутствие inline handoff в том же ответе запрещено.
    - Если есть pending user action или external step, финальная секция `Инструкция пользователю` обязательна.
