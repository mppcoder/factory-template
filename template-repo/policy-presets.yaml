  brownfield-audit:
    default_scenarios:
    - 00-master-router.md
    - brownfield/00-brownfield-entry.md
    - brownfield/01-system-inventory.md
    - brownfield/02-repo-audit.md
    - brownfield/04-gap-register.md
    minimum_evidence:
      required_all:
      - '[PROJECT]'
      required_any:
      - '[DOC]'
      - '[REAL]'
      - '[FIX]'
    codex_handoff:
      manual: forbidden
      hybrid: optional
      codex-led: forbidden
    notes:
    - Аудит может завершаться без handoff в Codex, если цель — инвентаризация и нормализация.
    - "Аудит не закрывает brownfield adoption: после него нужен переход к adoption/conversion или явный blocker."
    - Если handoff все же уже разрешен и задача достаточно определена, по умолчанию выдать inline handoff в том же ответе.
    - Если есть pending user action или external step, финальная секция `Инструкция пользователю` обязательна.
    - Internal repo follow-up не должен подменяться user-only closeout; для mixed follow-up сначала нужен inline handoff, затем user footer только для внешней границы.
