policy_presets:
  small-fix:
    default_scenarios:
    - 00-master-router.md
    - 02-decision-policy.md
    - 12-bug-analysis.md
    - 14-docs-normalization.md
    minimum_evidence:
      required_all:
      - '[PROJECT]'
      - '[DOC]'
      required_any:
      - '[FIX]'
      - '[REAL]'
    codex_handoff:
      manual: forbidden
      hybrid: optional
      codex-led: forbidden
    notes:
    - Используйте для небольших исправлений без масштабной перестройки системы.
    - Если handoff уже разрешен и задача достаточно определена, выдать inline handoff в том же ответе; если нужен следующий шаг пользователя, завершить ответ блоком `Инструкция пользователю`.
    - Internal repo follow-up не должен подменяться user-only closeout; для mixed follow-up сначала нужен inline handoff, затем user footer только для внешней границы.
    - Если verify green, `origin` настроен и canonical verified sync доступен, commit/push выполняются самим Codex через canonical sync path и не должны запрашиваться у пользователя как отдельное ручное подтверждение.
    - Если change затрагивает repo-first instruction layer или downstream template consumers, `Инструкция пользователю` должна быть расширена до completion package с affected contours, delete-before-replace и repo-level sync steps.
  feature:
    default_scenarios:
    - 00-master-router.md
    - 05-clarify-scope.md
    - 06-user-spec-generation.md
    - 08-tech-spec-generation.md
    - 10-task-decomposition.md
    - 15-handoff-to-codex.md
    minimum_evidence:
      required_all:
      - '[PROJECT]'
      - '[DOC]'
      required_any:
      - '[REAL]'
      - '[FIX]'
    codex_handoff:
      manual: forbidden
      hybrid: required
      codex-led: required
    notes:
    - Для новой функции обязательны spec, decomposition и verify.
    - Для change-class с required handoff отсутствие inline handoff в том же ответе запрещено.
    - Если есть pending user action или external step, финальная секция `Инструкция пользователю` обязательна.
    - Internal repo follow-up не должен подменяться user-only closeout; для mixed follow-up сначала нужен inline handoff, затем user footer только для внешней границы.
    - Если verify green, `origin` настроен и canonical verified sync доступен, commit/push выполняются самим Codex через canonical sync path и не должны запрашиваться у пользователя как отдельное ручное подтверждение.
