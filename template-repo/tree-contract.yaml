project_structures:
  common_project_core:
    ownership_class: project-core
    required_paths: *common_generated_required_paths
    invariant: "All projects are project lifecycle core plus a type-specific owned layer."
  factory_template_project:
    lifecycle_state: greenfield-active
    active_project_preset: greenfield-product
    layers:
      - project-core
      - factory-producer-owned
      - project-owned
    note: "factory-template is a greenfield product project whose product is the project factory."
  generated_greenfield:
    lifecycle_state: greenfield-active
    active_project_preset: greenfield-product
    layers:
      - project-core
      - project-owned
  transitional_brownfield_without_repo:
    lifecycle_states:
      - brownfield-without-repo-intake
      - brownfield-without-repo-reconstruction
      - brownfield-to-greenfield-conversion
    compatibility_presets:
      - brownfield-without-repo
    layers:
      - project-core
      - brownfield-evidence-owned
      - brownfield-reconstruction-owned
    conversion_target: generated_greenfield
    exit_gates: *conversion_gates
  transitional_brownfield_with_repo:
    lifecycle_states:
      - brownfield-with-repo-audit
      - brownfield-with-repo-adoption
      - brownfield-to-greenfield-conversion
    compatibility_presets:
      - brownfield-with-repo-modernization
      - brownfield-with-repo-integration
      - brownfield-with-repo-audit
    layers:
      - project-core
      - brownfield-audit-owned
      - project-owned
    conversion_target: generated_greenfield
    exit_gates: *conversion_gates
  converted_greenfield:
    lifecycle_state: greenfield-converted
    active_project_preset: greenfield-product
    layers:
      - project-core
      - project-owned
      - historical-archive
    future_sync_mode: greenfield-product

