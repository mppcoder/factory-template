tree_contract_version: 1
status: active
owner: factory-template
description: "Strict machine-readable tree contract for factory root, template base and generated project contours."

lifecycle_states:
  greenfield-active:
    description: "Normal active product development on the factory template."
    final_state: true
  brownfield-without-repo-intake:
    description: "Evidence collection for an existing system when no normalized repo exists yet."
    transitional: true
    next_states:
      - brownfield-without-repo-reconstruction
  brownfield-without-repo-reconstruction:
    description: "Create or identify a canonical repo root from incoming evidence."
    transitional: true
    next_states:
      - brownfield-with-repo-audit
      - brownfield-to-greenfield-conversion
  brownfield-with-repo-audit:
    description: "Map existing code, risks, constraints and safe zones."
    transitional: true
    next_states:
      - brownfield-with-repo-adoption
  brownfield-with-repo-adoption:
    description: "Install/apply the factory core and fix safe structure drift without overwriting product code."
    transitional: true
    next_states:
      - brownfield-to-greenfield-conversion
  brownfield-to-greenfield-conversion:
    description: "Update the active project profile/mode to greenfield-product."
    transitional: true
    next_states:
      - greenfield-converted
  greenfield-converted:
    description: "Final steady state after successful brownfield adoption."
    final_state: true

ownership_classes:
  project-core:
    sync_policy: template-owned-safe
    description: "Shared lifecycle core required in every project."
  template-owned-safe:
    sync_policy: controlled-apply
    description: "Template-owned reusable files eligible for previewed safe apply with rollback metadata."
  template-owned-clone:
    sync_policy: materialized-clone
    description: "Files materialized from template source and expected to remain clone-equivalent."
  template-owned-advisory:
    sync_policy: diff-only
    description: "Template guidance that may influence projects but is not automatically overwritten."
  project-owned:
    sync_policy: never-overwrite
    description: "Product code, specs, history and project decisions protected from template sync."
  brownfield-evidence-owned:
    sync_policy: never-overwrite
    description: "Transition evidence required during adoption; historical evidence after conversion."
  brownfield-reconstruction-owned:
    sync_policy: temporary-project-owned
    description: "Temporary reconstruction workspace that must resolve into canonical project code/repo."
  brownfield-audit-owned:
    sync_policy: never-overwrite
    description: "Audit/adoption records required during transition; retained as history after conversion."
  factory-producer-owned:
    sync_policy: factory-only
    description: "Template generation, release, packaging, registry, downstream sync and archives; excluded from battle project sync."
  historical-archive:
    sync_policy: never-overwrite
    description: "Historical evidence and release/archive records."
  transient-generated:
    sync_policy: ignored
    description: "Generated runtime/build/test output that should not become product source of truth."

conversion_gates: &conversion_gates
  - repo_first_core_present
  - master_router_present
  - scenario_pack_accessible
  - active_project_profile_updated_to_greenfield_product
  - lifecycle_state_greenfield_converted
  - greenfield_required_artifacts_present
  - brownfield_evidence_archived_or_referenced
  - project_owned_zones_protected
  - template_owned_zones_marked
  - sync_manifest_safe_for_downstream
  - validators_green

compatibility_layer:
  aliases_file: template-repo/compatibility-aliases.yaml
  legacy_wrapper_paths:
    - template-repo/scripts/install-codex-dogfood-pack.sh
  historical_archive_paths:
    - factory/producer/archive/legacy-bootstrap
    - PATCH_NOTES_codex_dogfood_p1.md
    - CONTROLLED_FIXES_AUDIT_2026-04-19.md

workspace_layout_policy:
  vps_projects_root: /projects
  top_level_rule: "Only final project roots may live directly under /projects."
  incoming_rule: "_incoming is allowed only inside a project root."
  intermediate_repo_rule: "All temporary, intermediate, reconstructed and helper repos for intake/adoption/reconstruction must live inside the target greenfield-product repo root, for example /projects/<target-greenfield-project>/..."
  forbidden:
    - "top-level service or staging directories directly under /projects"
    - "intermediate repos as sibling project roots under /projects"
    - "brownfield reconstruction repos outside the target greenfield-product repo"

naming_policy:
  project_name_role: "Human-readable free project name. May contain Russian, English, spaces and punctuation. Never use it directly as a repo path or GitHub repo name."
  project_slug_role: "Canonical lowercase Latin technical identifier generated from project_name or entered explicitly by the operator."
  project_slug_regex: "^[a-z0-9][a-z0-9-]{1,62}$"
  project_slug_max_length: 63
  project_slug_allowed_chars: "lowercase latin letters, digits and hyphen only"
  project_slug_rules:
    - "Generate project_slug with deterministic Russian transliteration."
    - "Collapse repeated hyphens and reject user-provided repeated hyphens."
    - "No leading or trailing hyphen."
    - "Empty slug is a blocker; never silently fall back to new-project."
    - "Local repo basename and GitHub repo name must match project_slug exactly."
    - "Default GitHub repo visibility is private unless explicit release/public policy says otherwise."
  transliteration_policy:
    russian_examples:
      "Краб — CRM для ремонта": krab-crm-remonta
      "Мой первый проект!!!": moy-pervyy-proekt
    english_examples:
      "AI Factory": ai-factory
    note: "Russian preposition `для` is omitted as slug noise; genitive words are transliterated as written, for example `ремонта` -> `remonta`."
  reserved_generic_project_slugs:
    - new-project
    - project
    - test
    - demo
    - example
    - factory-template
    - template-repo
  reserved_override_rule: "Reserved/generic slugs are blockers unless an explicit reserved_slug_override marker is recorded."
  local_repo_path_rule: "Production VPS path is /projects/<project_slug>; selected parent directory launches create ./<project_slug>."
  github_repo_rule: "GitHub repo is <github_owner>/<project_slug>; never silently append -2, -copy, dates or random suffixes."
  github_owner_resolution:
    - "Use explicit --github-owner or config value when present."
    - "Otherwise use authenticated gh/GitHub connector user only when unambiguous."
    - "If owner is ambiguous, stop with a blocker and ask for owner."
  brownfield_repo_naming:
    - "Final battle/canonical repo is named after the target product slug, not the transition stage."
    - "Do not auto-suffix final repo with -brownfield or -greenfield."
    - "Temporary, incoming, reconstructed and helper repos must live inside /projects/<project_slug>/..., not as sibling project roots under /projects."
  canonical_project_presets:
    - greenfield-product
    - brownfield-without-repo
    - brownfield-with-repo-modernization
    - brownfield-with-repo-integration
    - brownfield-with-repo-audit
  compatibility_aliases_forbidden_in_primary_ux:
    - product-dev
    - legacy-modernization
    - integration-project
    - audit-only
    - brownfield-dogfood-codex-assisted
  forbidden_path_terms:
    dogfood:
      allowed_paths:
        - factory/producer/archive/legacy-bootstrap
        - PATCH_NOTES_codex_dogfood_p1.md
        - CONTROLLED_FIXES_AUDIT_2026-04-19.md
        - template-repo/compatibility-aliases.yaml
        - template-repo/scripts/install-codex-dogfood-pack.sh
        - template-repo/language-archive-exceptions.yaml
        - reports/bugs/2026-04-25-tree-contract-and-naming-drift.md
    openclaw:
      allowed_paths:
        - factory/producer/reference/domain-packs/openclaw-reference
        - FACTORY_MANIFEST.yaml
        - template-repo/language-archive-exceptions.yaml
        - reports/bugs/2026-04-25-tree-contract-and-naming-drift.md
  active_ux_scan_paths:
    - README.md
    - ENTRY_MODES.md
    - docs/template-architecture-and-event-workflows.md
    - template-repo/README.md
    - template-repo/project-presets.yaml

