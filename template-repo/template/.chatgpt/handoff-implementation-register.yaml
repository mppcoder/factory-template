# Реестр жизненного цикла ChatGPT handoff / Codex self-handoff задач.
# Этот artifact template-owned. В generated project он materializes как
# `.chatgpt/handoff-implementation-register.yaml`.
schema: handoff-implementation-register/v1
scope:
  project: "{{PROJECT_NAME}}"
  owner_boundary: template-owned-generated-project-artifact
queue_policy:
  dependency_first: true
  blockers_raise_priority: true
  stale_visible_cards: true
  silent_drop_forbidden: true
replacement_policy:
  same_chat_same_task_single_active: true
  superseded_requires_replacement_link: true
  replacement_reason_required: true
chat_link_policy:
  chat_title_is_stable: true
  chat_title_is_not_status_source: true
  status_updates_do_not_require_chat_rename: true
  optional_item_fields:
    - chat_id
    - chat_title
    - task_slug
    - chat_state
    - chat_index_item_id
statuses:
  allowed:
    - captured
    - handoff_issued
    - self_handoff_created
    - queued
    - ready
    - in_progress
    - implemented
    - verified
    - blocked
    - not_applicable
    - superseded
    - archived
items: []
