- id: done
  title: Done/архивирование завершено
  status: completed
  evidence:
  - git status --short --branch
multi_step_execution:
  current_wave: 1
  waves:
  - id: wave-1
    title: State sync, module gates and roadmap materialization
    status: completed
    evidence:
    - docs/releases/unified-single-vps-downstream-beginner-roadmap.md
    - template-repo/template/.chatgpt/standards-gates.yaml
    tasks:
    - id: T-001
      title: Закрыть FT-CH-0011 и выровнять индексы
      status: completed
      owner_boundary: internal-repo-follow-up
      evidence:
      - .chatgpt/chat-handoff-index.yaml
    - id: T-002
      title: Закрыть module gate baseline без false green
      status: completed
      owner_boundary: internal-repo-follow-up
      evidence:
      - template-repo/template/.chatgpt/standards-gates.yaml
      - template-repo/template/.chatgpt/project-lifecycle-dashboard.yaml
    - id: T-003
      title: Материализовать single VPS и downstream proof roadmap
      status: completed
      owner_boundary: internal-repo-follow-up
      evidence:
      - docs/operator/single-big-vps-dev-runtime-architecture.md
      - docs/releases/unified-single-vps-downstream-beginner-roadmap.md
      - reports/release/downstream-application-proof-report.md
    - id: T-004
      title: Усилить beginner-first Windows-to-first-project path
      status: completed
      owner_boundary: internal-repo-follow-up
      evidence:
      - docs/operator/beginner-first-windows-to-first-project.md
      - docs/operator/runbook-packages/01-factory-template/01-user-runbook.md
      - docs/operator/runbook-packages/02-greenfield-product/01-user-runbook.md
  completed_tasks:
  - T-001
  - T-002
  - T-003
  - T-004
  blocked_tasks: []
  next_task:
    id: T-NEXT
    owner_boundary: internal-repo-follow-up
    action: Запустить первый реальный greenfield product intake или оставить release/public deploy как future approval boundary.
  final_verification:
    status: passed
    evidence:
    - python3 template-repo/scripts/validate-chat-handoff-index.py .chatgpt/chat-handoff-index.yaml
    - python3 template-repo/scripts/validate-runbook-packages.py .
    - python3 template-repo/scripts/validate-project-lifecycle-dashboard.py template-repo/template/.chatgpt/project-lifecycle-dashboard.yaml
    - python3 template-repo/scripts/validate-standards-gates.py .
    - bash template-repo/scripts/verify-all.sh quick
    - bash template-repo/scripts/verify-all.sh
  archive_to_work_completed:
    allowed: true
    reason: 'Final verification passed; closeout remains repo sync only.'
handoff_orchestration:
  parent_handoff:
    id: FT-CH-0011-unified-roadmap
    title: Single big VPS, downstream proof and beginner-first roadmap baseline
    status: completed
    evidence:
    - .chatgpt/chat-handoff-index.yaml
    - bash template-repo/scripts/verify-all.sh
  child_tasks: []
  selected_profile: deep
  selected_model: gpt-5.5
  selected_reasoning_effort: high
  selected_plan_mode_reasoning_effort: high
  route_explanation_boundary: Advisory layer показывает маршрут и handoff-текст, но
    не переключает model/profile/reasoning внутри уже открытой Codex-сессии; надежная
    executable boundary — новый task launch или ручной picker в новом чате.
  source_artifacts:
  - .chatgpt/orchestration-cockpit.yaml
handoff_implementation_control:
  enabled: true
  source_artifact: .chatgpt/handoff-implementation-register.yaml
  dashboard_section: Handoff implementation control
  queue_policy: deterministic_dependency_priority_calculation
  summary:
    open_items: 0
    blocked_items: 0
    implemented_not_verified: 0
    stale_items_without_recent_evidence: 0
  route_boundary: Dashboard показывает handoff route/model/reasoning как readout;
    handoff/register не переключают model/profile/reasoning внутри уже открытой Codex-сессии.
  closeout_policy: 'Codex при завершении задачи обновляет matching item: status, evidence,
    новые self-handoff items, superseded replacement links или explicit not_applicable
    closeout без silent deletion.'
universal_task_control:
  status: pending
  registry_path: template-repo/template/.chatgpt/task-registry.yaml
  open_tasks: 0
  ready_for_handoff: 0
  ready_for_codex: 0
  codex_running: 0
  human_review: 0
  blocked: 0
  verified: 0
  next_action: Generate or update Codex handoff for the next ready task.
  fallback_next_action: Keep task in triage until route, evidence and human boundary
    are clear.
  evidence:
  - template-repo/template/.chatgpt/task-registry.yaml
  - template-repo/scripts/validate-task-registry.py
  - template-repo/scripts/allocate-task-id.py
  - template-repo/scripts/issue-to-task-registry.py
  - template-repo/scripts/preview-task-handoff.py
  - template-repo/scripts/update-task-status.py
  - template-repo/scripts/prepare-task-pack.py
  - template-repo/scripts/render-task-queue.py
  - reports/task-queue.md
