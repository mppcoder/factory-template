schema: project-lifecycle-dashboard/v1
project:
  name: '{{PROJECT_NAME}}'
  slug: '{{PROJECT_SLUG}}'
  profile: greenfield-product
  lifecycle_state: '{{LIFECYCLE_STATE}}'
  current_mode: '{{PROJECT_MODE}}'
  factory_producer_owned_layer: false
  owner_boundary: template-owned-generated-project-artifact
lifecycle_phase:
  current: release
  previous: verification
  next: deploy
  allowed:
  - idea
  - intake
  - spec
  - architecture
  - handoff
  - execution
  - verification
  - release
  - deploy
  - operate
  - improve
  compact_chain:
  - id: idea
    label: Идея
    status: completed
    evidence:
    - .chatgpt/intake.yaml
  - id: intake
    label: Intake
    status: completed
    evidence:
    - .chatgpt/intake.yaml
  - id: spec
    label: Спека
    status: completed
    evidence:
    - .chatgpt/user-spec.md
  - id: architecture
    label: Архитектура
    status: completed
    evidence:
    - .chatgpt/tech-spec.md
  - id: handoff
    label: Handoff
    status: completed
    evidence:
    - .chatgpt/normalized-codex-handoff.md
  - id: execution
    label: Исполнение
    status: completed
    evidence:
    - .chatgpt/chat-handoff-index.yaml
    - docs/releases/unified-single-vps-downstream-beginner-roadmap.md
  - id: verification
    label: Проверка
    status: completed
    evidence:
    - bash template-repo/scripts/verify-all.sh quick
    - bash template-repo/scripts/verify-all.sh
  - id: release
    label: Release
    status: pending
    evidence: []
  - id: deploy
    label: Deploy
    status: pending
    evidence: []
  - id: operate
    label: Сопровождение
    status: pending
    evidence: []
