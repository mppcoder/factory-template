# Единая repo-native панель состояния проекта.
# Английские ключи используются валидаторами; значения и operator-facing текст можно писать по-русски.
schema: project-lifecycle-dashboard/v1

project:
  name: "{{PROJECT_NAME}}"
  slug: "{{PROJECT_SLUG}}"
  profile: "greenfield-product"
  lifecycle_state: "{{LIFECYCLE_STATE}}"
  current_mode: "{{PROJECT_MODE}}"
  factory_producer_owned_layer: false
  owner_boundary: template-owned-generated-project-artifact

lifecycle_phase:
  current: execution
  previous: handoff
  next: verification
  allowed:
    - idea
    - intake
    - spec
    - architecture
    - handoff
    - execution
    - verification
    - release
    - deploy
    - operate
    - improve
  compact_chain:
    - id: idea
      label: "Идея"
      status: completed
      evidence:
        - ".chatgpt/intake.yaml"
    - id: intake
      label: "Intake"
      status: completed
      evidence:
        - ".chatgpt/intake.yaml"
    - id: spec
      label: "Спека"
      status: completed
      evidence:
        - ".chatgpt/user-spec.md"
    - id: architecture
      label: "Архитектура"
      status: completed
      evidence:
        - ".chatgpt/tech-spec.md"
    - id: handoff
      label: "Handoff"
      status: completed
      evidence:
        - ".chatgpt/normalized-codex-handoff.md"
    - id: execution
      label: "Исполнение"
      status: in_progress
      evidence: []
    - id: verification
      label: "Проверка"
      status: pending
      evidence: []
    - id: release
      label: "Release"
      status: pending
      evidence: []
    - id: deploy
      label: "Deploy"
      status: pending
      evidence: []
    - id: operate
      label: "Сопровождение"
      status: pending
      evidence: []

active_change:
  id: ""
  title: "Первое изменение проекта"
  class: feature
  priority: medium
  status: draft
  owner_boundary: internal-repo-follow-up
  source_artifacts:
    - ".chatgpt/task-index.yaml"

stage_gates:
  - id: intake
    title: "Intake принят"
    status: pending
    evidence: []
  - id: classification
    title: "Маршрут и класс задачи выбраны"
    status: pending
    evidence: []
  - id: reuse_reality_check
    title: "Reuse/reality-check выполнен"
    status: pending
    evidence: []
  - id: spec
    title: "User spec готов"
    status: pending
    evidence: []
  - id: tech_spec
    title: "Tech spec готов"
    status: pending
    evidence: []
  - id: handoff_allowed
    title: "Handoff разрешен"
    status: pending
    evidence: []
  - id: execution
    title: "Execution завершен"
    status: pending
    evidence: []
  - id: verification
    title: "Verification завершена"
    status: pending
    evidence: []
  - id: done
    title: "Done/архивирование завершено"
    status: pending
    evidence: []

multi_step_execution:
  current_wave: 0
  waves:
    - id: wave-0
      title: "Подготовка"
      status: pending
      tasks:
        - id: T-001
          title: "Зафиксировать intake и следующий шаг"
          status: pending
          owner_boundary: internal-repo-follow-up
          evidence: []
  completed_tasks: []
  blocked_tasks: []
  next_task:
    id: T-001
    owner_boundary: internal-repo-follow-up
    action: "Заполнить `.chatgpt/task-index.yaml`, `.chatgpt/stage-state.yaml` и уточнить первый рабочий шаг."
  final_verification:
    status: pending
    evidence: []
  archive_to_work_completed:
    allowed: false
    reason: "Feature нельзя архивировать до `final_verification.status: passed` и evidence."

handoff_orchestration:
  parent_handoff:
    id: ""
    title: ""
    status: not_started
  child_tasks: []
  selected_profile: ""
  selected_model: ""
  selected_reasoning_effort: ""
  selected_plan_mode_reasoning_effort: ""
  route_explanation_boundary: "Advisory layer показывает маршрут и handoff-текст, но не переключает model/profile/reasoning внутри уже открытой Codex-сессии; надежная executable boundary — новый task launch или ручной picker в новом чате."
  source_artifacts:
    - ".chatgpt/orchestration-cockpit.yaml"

handoff_implementation_control:
  enabled: true
  source_artifact: ".chatgpt/handoff-implementation-register.yaml"
  dashboard_section: "Handoff implementation control"
  queue_policy: deterministic_dependency_priority_calculation
  summary:
    open_items: 0
    blocked_items: 0
    implemented_not_verified: 0
    stale_items_without_recent_evidence: 0
  route_boundary: "Dashboard показывает handoff route/model/reasoning как readout; handoff/register не переключают model/profile/reasoning внутри уже открытой Codex-сессии."
  closeout_policy: "Codex при завершении задачи обновляет matching item: status, evidence, новые self-handoff items, superseded replacement links или explicit not_applicable closeout без silent deletion."

universal_task_control:
  status: in_progress
  registry_path: template-repo/template/.chatgpt/task-registry.yaml
  open_tasks: 1
  ready_for_handoff: 0
  ready_for_codex: 0
  codex_running: 0
  human_review: 0
  blocked: 0
  verified: 0
  next_action: Add first real tasks through task registry or GitHub issue bridge.
  fallback_next_action: Keep using existing handoff implementation register when a task is not yet ready for registry allocation.
  evidence:
    - template-repo/template/.chatgpt/task-registry.yaml
    - template-repo/scripts/validate-task-registry.py
    - template-repo/scripts/allocate-task-id.py
    - template-repo/scripts/issue-to-task-registry.py
    - template-repo/scripts/preview-task-handoff.py
    - template-repo/scripts/update-task-status.py
    - template-repo/scripts/prepare-task-pack.py

module_readiness:
  selected_profile: solo_lightweight
  source_artifact: ".chatgpt/project-lifecycle-dashboard.yaml"
  false_green_policy: "Green module statuses require evidence or accepted_reason; this is standards-inspired readiness, not compliance or certification."
  required_modules:
    - lifecycle
    - core
    - security
    - ui_a11y
    - quality
    - websec
    - ops
    - ai
  modules:
    - id: lifecycle
      label: "Lifecycle"
      status: completed
      standard_refs: [iso_12207]
      gate_refs: [lifecycle_intent_recorded, product_requirements_recorded]
      source_refs: []
      evidence:
        - ".chatgpt/project-lifecycle-dashboard.yaml"
        - ".chatgpt/stage-state.yaml"
      accepted_reason: ""
    - id: core
      label: "Core"
      status: in_progress
      standard_refs: []
      gate_refs: []
      source_refs: [active_change, stage_gates, multi_step_execution, final_verification]
      evidence: []
      accepted_reason: ""
    - id: security
      label: "Security"
      status: in_progress
      standard_refs: [nist_ssdf]
      gate_refs: [security_minimum_checked]
      source_refs: []
      evidence: []
      accepted_reason: ""
    - id: ui_a11y
      label: "UI/A11y"
      status: pending
      standard_refs: [wcag_22]
      gate_refs: [accessibility_minimum_checked]
      source_refs: []
      evidence: []
      accepted_reason: ""
    - id: quality
      label: "Quality"
      status: pending
      standard_refs: [iso_25010]
      gate_refs: [quality_minimum_checked]
      source_refs: []
      evidence: []
      accepted_reason: ""
    - id: websec
      label: "WebSec"
      status: pending
      standard_refs: [owasp_asvs]
      gate_refs: [web_security_checked]
      source_refs: []
      evidence: []
      accepted_reason: ""
    - id: ops
      label: "Ops"
      status: pending
      standard_refs: [dora_metrics]
      gate_refs: [operations_health_baseline]
      source_refs: [deploy_runtime, software_update_governance]
      evidence: []
      accepted_reason: ""
    - id: ai
      label: "AI"
      status: not_applicable
      standard_refs: [openai_ai_safety_overlay]
      gate_refs: [ai_safety_gate]
      source_refs: []
      evidence: []
      accepted_reason: "Project has not declared AI model, agent or AI-output behavior."

