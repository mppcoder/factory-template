# Лог фактического запуска новой задачи Codex.
launch:
  timestamp_utc: ""
  launch_unit: "new-task-launch"
  launch_source: "chatgpt-handoff" # chatgpt-handoff / direct-task
  router_layer: "executable"
  handoff_shape: "codex-task-handoff" # neutral handoff; Codex decides actual execution_mode
  goal_contract_path: ".chatgpt/goal-contract.yaml"
  goal_runtime_recommendation: "goal_first_contract_only"
  codex_goal_live_validation_required: true
  codex_goal_live_validation_evidence: ""
  handoff_shape_reasons: []
  task_class: "build" # quick / build / deep / review
  task_class_reasons: []
  selected_profile: "build"
  selected_model: "gpt-5.5"
  selected_reasoning_effort: "medium"
  selected_plan_mode_reasoning_effort: "medium"
  apply_mode: "manual-ui"
  strict_launch_mode: "optional"
  project_profile: "greenfield-product"
  selected_scenario: "00-master-router.md"
  pipeline_stage: "intake"
  artifacts_to_update:
    - .chatgpt/codex-input.md
    - .chatgpt/codex-context.md
    - .chatgpt/codex-task-pack.md
  handoff_allowed: "yes"
  defect_capture_path: "not-required"
  task_summary: ""
  launch_boundary_rule: ""
  interactive_default_rule: ""
  executable_switch_rule: ""
  strict_launch_rule: ""
  live_session_fallback_rule: ""
  model_expectation_rule: ""
  model_catalog_status: ""
  model_catalog_last_checked_utc: ""
  model_catalog_validation_note: ""
  goal_first_boundary_rule: "goal first normalizes task outcome/DoD/evidence before route; it does not change selected_profile/model/reasoning by itself"
  codex_goal_runtime_boundary_rule: "Codex /goal runtime is optional and live-gated; experimental goals require explicit operator/user choice"
  advisory_layers: []
  executable_layers: []
  launch_artifact_path: ".chatgpt/codex-input.md"
  launch_command: "./scripts/launch-codex-task.sh --launch-source chatgpt-handoff --task-file .chatgpt/codex-input.md --execute"
  codex_profile_command: "codex --profile build"
  strict_launch_use_cases: []
  direct_self_handoff_required: false
  direct_self_handoff_completed: false
