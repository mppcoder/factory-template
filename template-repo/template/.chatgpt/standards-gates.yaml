schema: standards-gates/v1
selected_profile: solo_lightweight
standards_registry: "template-repo/standards/lifecycle-standards-registry.yaml"
stage_map: "template-repo/standards/lifecycle-stage-map.yaml"
project_claims:
  production_target: false
  commercial_claim: false
  ai_app: false
  ai_ready_for_users: false
  formal_certification_claim: false
  compliance_claim: false
  claim_evidence: []
false_green_policy: "A gate marked passed/completed/done/ready must include evidence or accepted_reason. not_applicable also requires accepted_reason."
false_compliance_boundary: "Do not claim ISO, NIST, OWASP, WCAG, DORA or OpenAI certification/compliance from this template gate file."

standard_versions:
  - standard_ref: iso_12207
    selected_version: "2017"
    version_status: current_with_revision_pending
    dashboard_current_claim: false
  - standard_ref: iso_25010
    selected_version: "2023"
    version_status: current_published
    dashboard_current_claim: true
  - standard_ref: nist_ssdf
    selected_version: "1.1"
    version_status: current_final
    dashboard_current_claim: true
  - standard_ref: owasp_asvs
    selected_version: "5.0.0"
    version_status: current_stable_release
    dashboard_current_claim: true
  - standard_ref: wcag_22
    selected_version: "2.2"
    version_status: current_w3c_recommendation
    dashboard_current_claim: true
  - standard_ref: dora_metrics
    selected_version: current-five-metric-model
    version_status: current_dora_guidance
    dashboard_current_claim: true

gates:
