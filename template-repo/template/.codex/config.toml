# Static default нужен только как fallback, если launcher обойден вручную.
# Канонический route для новой задачи идет через scripts/launch-codex-task.sh.
model = "gpt-5.5"
model_reasoning_effort = "medium"
plan_mode_reasoning_effort = "medium"
approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "cached"
profile = "build"

[sandbox_workspace_write]
network_access = false
writable_roots = []

[agents]
max_threads = 4
max_depth = 1

[profiles.quick]
model = "gpt-5.4-mini"
model_reasoning_effort = "low"
plan_mode_reasoning_effort = "medium"

[profiles.build]
model = "gpt-5.5"
model_reasoning_effort = "medium"
plan_mode_reasoning_effort = "medium"

[profiles.deep]
model = "gpt-5.5"
model_reasoning_effort = "high"
plan_mode_reasoning_effort = "high"

[profiles.review]
model = "gpt-5.5"
model_reasoning_effort = "high"
plan_mode_reasoning_effort = "high"
