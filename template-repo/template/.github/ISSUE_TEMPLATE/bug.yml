name: "Bug / ошибка"
description: "Сообщить об ошибке, регрессии или неожиданном поведении."
title: "[Bug]: "
labels: ["type:bug", "risk:medium", "status:needs-info"]
body:
  - type: markdown
    attributes:
      value: |
        Это локальная задача repo. Не вставляйте секреты, токены, пароли, private keys, приватные URL или необработанные приватные логи.
        Для запуска bounded issue-autofix maintainer добавит `agent:ready` или напишет `/factory fix`.
  - type: textarea
    id: symptom
    attributes:
      label: "Симптом"
      description: "Что вы увидели?"
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: "Шаги воспроизведения"
      description: "Команды или действия, по которым ошибку можно повторить."
      placeholder: |
        1. Запустить ...
        2. Открыть ...
        3. Получить ошибку ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: "Expected / ожидаемый результат"
      description: "Как должно было быть?"
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: "Фактический результат"
      description: "Что произошло на самом деле?"
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: "Acceptance criteria / критерии готовности"
      description: "Какая проверка подтвердит исправление?"
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: "Затронутая поверхность"
      options:
        - surface:scenario-pack
        - surface:template
        - surface:launcher
        - surface:validator
        - surface:runbook
        - surface:docs
        - unknown
    validations:
      required: true
  - type: checkboxes
    id: redaction
    attributes:
      label: "Безопасность"
      options:
        - label: "Я проверил(а), что в issue нет секретов, токенов, паролей или private keys."
          required: true
