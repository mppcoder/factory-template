model_catalog:
  last_checked_utc: "2026-04-25T18:26:17Z"
  catalog_source: "codex debug models"
  catalog_check_status: "available"
  discovered_models:
    gpt-5.5:
      supported_reasoning_efforts: ["low", "medium", "high", "xhigh"]
      default_reasoning_effort: "medium"
    gpt-5.4:
      supported_reasoning_efforts: ["low", "medium", "high", "xhigh"]
      default_reasoning_effort: "medium"
    gpt-5.4-mini:
      supported_reasoning_efforts: ["low", "medium", "high", "xhigh"]
      default_reasoning_effort: "medium"
    gpt-5.3-codex:
      supported_reasoning_efforts: ["low", "medium", "high", "xhigh"]
      default_reasoning_effort: "medium"
    gpt-5.3-codex-spark:
      supported_reasoning_efforts: ["low", "medium", "high", "xhigh"]
      default_reasoning_effort: "high"
    gpt-5.2:
      supported_reasoning_efforts: ["low", "medium", "high", "xhigh"]
      default_reasoning_effort: "medium"
    codex-auto-review:
      supported_reasoning_efforts: ["low", "medium", "high", "xhigh"]
      default_reasoning_effort: "medium"

model_policy:
  allowed_profiles: ["quick", "build", "deep", "review"]
  fallback_policy:
    if_live_catalog_unavailable: "warn и сохранить repo-configured mapping; не утверждать live availability"
    if_configured_model_missing: "fail в strict mode; warn/error в normal validation в зависимости от validator context"
    if_reasoning_unsupported: "fail в strict mode; до handoff confidence сообщить remediation"
  promotion_policy:
    default_action: "proposal-only"
    safe_apply_scope:
      - "refresh model_catalog.last_checked_utc"
      - "refresh model_catalog.discovered_models"
      - "refresh model_catalog.catalog_check_status"
    auto_promote_profiles: false
    candidate_order:
      - "gpt-5.5"
      - "gpt-5.4"
      - "gpt-5.4-mini"
      - "gpt-5.3-codex"
      - "gpt-5.3-codex-spark"
      - "gpt-5.2"
    manual_review_required_for:
      - "изменение selected_model для существующего selected_profile"
      - "понижение reasoning effort"
      - "использование модели вне model_policy.candidate_order"
      - "переключение на codex-auto-review вне review-only automation"
      - "удаление configured model"
  manual_review_marker: "manual_review_required"

prompt_migration_policy:
  default_action: "proposal-required"
  trigger_when:
    - "live catalog показывает новый candidate model"
    - "proposal меняет selected_model для любого profile"
    - "proposal меняет reasoning effort или plan-mode reasoning effort"
    - "OpenAI docs публикуют model-specific prompt guidance для candidate model"
  official_source_baseline:
    - "https://developers.openai.com/api/docs/guides/latest-model"
    - "https://developers.openai.com/api/docs/guides/prompt-guidance"
    - "https://developers.openai.com/api/docs/guides/prompt-optimizer"
  required_prompt_review:
    - "не считать новую model drop-in replacement"
    - "создать fresh prompt baseline для affected prompt-like artifacts"
    - "проверить outcome-first contract: целевой результат, success criteria, constraints, evidence requirements, output shape, stop rules"
    - "сверить reasoning, verbosity и tool-use guidance с official OpenAI docs"
    - "обновить validators/evals, которые ловят drift старого prompt pattern"
    - "сохранить repo-first, defect-capture, handoff, routing и closeout invariants"
  required_artifacts:
    - "reports/model-routing/model-routing-proposal.md"
    - "reports/prompt-migration/"
    - "template-repo/scripts/validate-gpt55-prompt-contract.py или successor validator для новой model"
    - "tests/artifact-eval/specs/*prompt-contract*.yaml"
  manual_review_required_for:
    - "любой automatic profile promotion"
    - "удаление или ослабление prompt constraints"
    - "перенос старого prompt stack без fresh baseline"
    - "отсутствие official OpenAI source map"

task_class_routing:
  quick:
    selected_profile: "quick"
  build:
    selected_profile: "build"
  deep:
    selected_profile: "deep"
  review:
    selected_profile: "review"

profile_routes:
  quick:
    selected_model: "gpt-5.4-mini"
    selected_reasoning_effort: "low"
    selected_plan_mode_reasoning_effort: "medium"
    manual_review_required: false
  build:
    selected_model: "gpt-5.5"
    selected_reasoning_effort: "medium"
    selected_plan_mode_reasoning_effort: "medium"
    manual_review_required: false
  deep:
    selected_model: "gpt-5.5"
    selected_reasoning_effort: "high"
    selected_plan_mode_reasoning_effort: "high"
    manual_review_required: false
  review:
    selected_model: "gpt-5.5"
    selected_reasoning_effort: "high"
    selected_plan_mode_reasoning_effort: "high"
    manual_review_required: false
