change_classes:
  small-fix:
    title: Небольшое исправление
    allowed_execution_modes:
    - manual
    - hybrid
    required_gates:
    - intake_complete
    - classification_complete
    - reuse_check_complete
    - reality_check_complete
    required_artifacts:
    - .chatgpt/reuse-check.md
    - .chatgpt/reality-check.md
    - .chatgpt/evidence-register.md
    recommended_task_types:
    - analysis
    - docs
    - fix
    notes:
    - Если выбранный режим допускает handoff и обязательные gate'ы с артефактами уже достаточны, handoff нужно выдать inline в том же ответе, а не заканчивать ответ только аналитикой.
    - Если остается pending external/user step, обязательна финальная секция `Инструкция пользователю`.
    - Internal repo follow-up не должен маркироваться как внешний шаг; для mixed follow-up сначала нужен inline handoff, затем user footer только для внешней границы.
    - Если verify green, `origin` настроен и canonical verified sync доступен, commit/push считаются внутренней работой Codex, а не отдельным ручным шагом пользователя.
    - Если change влияет на repo-first instruction layer или downstream template consumers, footer должен быть расширен до completion package с affected contours, delete-before-replace и repo-level sync steps.
  feature:
    title: Новая функция
    allowed_execution_modes:
    - hybrid
    - codex-led
    required_gates:
    - intake_complete
    - classification_complete
    - reuse_check_complete
    - reality_check_complete
    - conflict_detection_complete
    - spec_validated
    - tech_spec_validated
    - task_validation_complete
    required_artifacts:
    - .chatgpt/user-spec.md
    - .chatgpt/tech-spec.md
    - .chatgpt/task-index.yaml
    - .chatgpt/codex-input.md
    recommended_task_types:
    - analysis
    - design
    - implementation
    - docs
    - verify
    notes:
    - Для `hybrid` и `codex-led` handoff не может оставаться только в аналитическом виде: при достаточности gate'ов и артефактов нужен inline handoff в том же ответе.
    - Если остается pending external/user step, обязательна финальная секция `Инструкция пользователю`.
    - Internal repo follow-up не должен маркироваться как внешний шаг; для mixed follow-up сначала нужен inline handoff, затем user footer только для внешней границы.
    - Если verify green, `origin` настроен и canonical verified sync доступен, commit/push считаются внутренней работой Codex, а не отдельным ручным шагом пользователя.
    - Если change влияет на repo-first instruction layer или downstream template consumers, footer должен быть расширен до completion package с affected contours, delete-before-replace и repo-level sync steps.
  refactor:
    title: Рефакторинг
    allowed_execution_modes:
    - manual
    - hybrid
    - codex-led
    required_gates:
    - intake_complete
    - classification_complete
    - reuse_check_complete
    - reality_check_complete
    - conflict_detection_complete
    - tech_spec_validated
    - task_validation_complete
    required_artifacts:
    - .chatgpt/reality-check.md
    - .chatgpt/conflict-report.md
    - .chatgpt/task-index.yaml
    recommended_task_types:
    - analysis
    - refactor
    - docs
    - verify
    notes:
    - Для режимов, где handoff допустим, при достаточности gate'ов и артефактов нужен inline handoff в том же ответе.
    - Если остается pending external/user step, обязательна финальная секция `Инструкция пользователю`.
    - Internal repo follow-up не должен маркироваться как внешний шаг; для mixed follow-up сначала нужен inline handoff, затем user footer только для внешней границы.
    - Если verify green, `origin` настроен и canonical verified sync доступен, commit/push считаются внутренней работой Codex, а не отдельным ручным шагом пользователя.
    - Если change влияет на repo-first instruction layer или downstream template consumers, footer должен быть расширен до completion package с affected contours, delete-before-replace и repo-level sync steps.
  migration:
    title: Миграция или перенос
    allowed_execution_modes:
    - hybrid
    - codex-led
    required_gates:
    - intake_complete
    - classification_complete
    - reuse_check_complete
    - reality_check_complete
    - conflict_detection_complete
    - spec_validated
    - tech_spec_validated
    - task_validation_complete
    required_artifacts:
    - .chatgpt/reality-check.md
    - .chatgpt/conflict-report.md
    - .chatgpt/tech-spec.md
    - .chatgpt/task-index.yaml
    recommended_task_types:
    - analysis
    - migration
    - docs
    - verify
    notes:
    - Для всех допустимых режимов handoff должен выдаваться inline сразу после закрытия обязательных gate'ов и артефактов.
    - Если остается pending external/user step, обязательна финальная секция `Инструкция пользователю`.
    - Internal repo follow-up не должен маркироваться как внешний шаг; для mixed follow-up сначала нужен inline handoff, затем user footer только для внешней границы.
    - Если verify green, `origin` настроен и canonical verified sync доступен, commit/push считаются внутренней работой Codex, а не отдельным ручным шагом пользователя.
    - Если change влияет на repo-first instruction layer или downstream template consumers, footer должен быть расширен до completion package с affected contours, delete-before-replace и repo-level sync steps.
  brownfield-audit:
    title: Аудит существующей системы
    allowed_execution_modes:
    - manual
    - hybrid
    required_gates:
    - intake_complete
    - classification_complete
    - reuse_check_complete
    - reality_check_complete
    required_artifacts:
    - .chatgpt/reality-check.md
    - .chatgpt/evidence-register.md
    - brownfield/system-inventory.md
    - brownfield/repo-audit.md
    recommended_task_types:
    - analysis
    - audit
    - docs
    notes:
    - Если handoff не нужен по цели аудита, допустим closeout без Codex handoff.
    - Если handoff уже разрешен и задача достаточно определена, по умолчанию выдать inline handoff в том же ответе.
    - Если остается pending external/user step, обязательна финальная секция `Инструкция пользователю`.
    - Если remaining work еще внутренний и Codex-eligible, user-only closeout запрещен даже для audit-like хвоста.
    - Если verify green, `origin` настроен и canonical verified sync доступен, commit/push считаются внутренней работой Codex, а не отдельным ручным шагом пользователя.
    - Если change влияет на repo-first instruction layer или downstream template consumers, footer должен быть расширен до completion package с affected contours, delete-before-replace и repo-level sync steps.
  brownfield-stabilization:
    title: Стабилизация brownfield-контура
    allowed_execution_modes:
    - hybrid
    - codex-led
    required_gates:
    - intake_complete
    - classification_complete
    - reuse_check_complete
    - reality_check_complete
    - conflict_detection_complete
    - task_validation_complete
    required_artifacts:
    - .chatgpt/reality-check.md
    - .chatgpt/evidence-register.md
    - brownfield/system-inventory.md
    - brownfield/repo-audit.md
    - brownfield/reverse-engineering-summary.md
    - .chatgpt/codex-input.md
    recommended_task_types:
    - analysis
    - audit
    - docs
    - fix
    - verify
    notes:
    - Используйте для evidence-first стабилизации live brownfield, а не для реконструкции
      истории исходного repo.
    - После закрытия обязательных gate'ов и подготовки обязательных артефактов нельзя останавливаться на одной аналитике: нужен inline handoff в том же ответе.
    - Если остается pending external/user step, обязательна финальная секция `Инструкция пользователю`.
    - Internal repo follow-up не должен маркироваться как внешний шаг; для mixed follow-up сначала нужен inline handoff, затем user footer только для внешней границы.
    - Если verify green, `origin` настроен и canonical verified sync доступен, commit/push считаются внутренней работой Codex, а не отдельным ручным шагом пользователя.
    - Если change влияет на repo-first instruction layer или downstream template consumers, footer должен быть расширен до completion package с affected contours, delete-before-replace и repo-level sync steps.
