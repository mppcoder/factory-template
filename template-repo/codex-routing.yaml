routing_contract:
  launch_unit: "new-task-launch"
  launch_boundary_rule: "Выбор модели и reasoning mode считается надежным только на новом запуске Codex для новой задачи."
  executable_switch_rule: "Надежно исполняемый switch в live Codex для этого repo: явный новый task launch через launcher и selected_profile."
  model_expectation_rule: "selected_model и selected_reasoning_effort фиксируют ожидаемую конфигурацию выбранного executable profile; advisory handoff text сам по себе ничего не переключает."
  advisory_layers:
    - "AGENTS.md / AGENT.md"
    - "ChatGPT Project Instructions"
    - "scenario-pack"
    - ".chatgpt docs и handoff guidance"
  executable_layers:
    - "scripts/resolve-codex-task-route.py"
    - "scripts/bootstrap-codex-task.py"
    - "scripts/launch-codex-task.sh"
    - ".codex/config.toml named profiles"
  launch_sources:
    - "chatgpt-handoff"
    - "direct-task"
  required_handoff_fields:
    - "launch_source"
    - "task_class"
    - "selected_profile"
    - "selected_model"
    - "selected_reasoning_effort"
    - "project_profile"
    - "selected_scenario"
    - "pipeline_stage"
    - "artifacts_to_update"
    - "handoff_allowed"
    - "defect_capture_path"
    - "launch_command"
    - "codex_profile_command"

validation:
  live_catalog_check: "Проверять model IDs и reasoning support против `codex debug models`; если live catalog недоступен, не обещать, что mapping гарантированно исполним."
  troubleshooting:
    - "Если handoff вставлен в уже открытую или случайную Codex chat-сессию, это non-canonical path: завершите сессию и выполните новый task launch."
    - "Если после launch виден sticky last-used profile/model/reasoning, снова выполните launch_command и проверьте named profile в local Codex config."
    - "Если selected_model отсутствует в live catalog, обновите codex-routing.yaml или local profile mapping, прежде чем обещать этот model ID пользователю."

profiles:
  quick:
    model: "gpt-5.4-mini"
    reasoning_effort: "low"
    plan_mode_reasoning_effort: "medium"
    purpose: "Быстрые docs/triage/search и другие low-risk short tasks."
    expected_use_cases:
      - "docs"
      - "triage"
      - "search"
      - "inventory"
      - "lightweight follow-up"
  build:
    model: "gpt-5.4"
    reasoning_effort: "medium"
    plan_mode_reasoning_effort: "medium"
    purpose: "Обычная реализация feature/fix/change без тяжелого RCA."
    expected_use_cases:
      - "feature"
      - "fix"
      - "implementation"
      - "remediation"
      - "scaffolding"
  deep:
    model: "gpt-5.4"
    reasoning_effort: "high"
    plan_mode_reasoning_effort: "high"
    purpose: "RCA, audit, architecture и другие задачи, где главное - глубина анализа."
    expected_use_cases:
      - "root-cause"
      - "audit"
      - "architecture"
      - "migration"
      - "scenario alignment"
  review:
    model: "gpt-5.4"
    reasoning_effort: "high"
    plan_mode_reasoning_effort: "high"
    purpose: "Review/tests/cleanup/final verification."
    expected_use_cases:
      - "review"
      - "tests"
      - "cleanup"
      - "verification"
      - "release-facing pass"

