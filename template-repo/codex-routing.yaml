routing_contract:
  launch_unit: "new-task-launch"
  launch_boundary_rule: "Выбор модели и reasoning mode считается надежным только на новом запуске Codex для новой задачи."
  interactive_default_rule: "Для интерактивной работы в VS Code Codex extension основной пользовательский путь: открыть новое окно/чат Codex, вручную выбрать model/reasoning в picker и затем вставить handoff."
  executable_switch_rule: "Строго воспроизводимое executable-переключение в live Codex для этого repo: явный новый task launch через launcher и selected_profile."
  strict_launch_rule: "Launcher-first path остается опциональным строгим режимом для автоматизации, воспроизводимости, запуска из shell и scripted launch."
  live_session_fallback_rule: "Уже открытая live session не является надежным механизмом автопереключения profile/model/reasoning и допустима только как неканонический fallback."
  model_expectation_rule: "selected_model и selected_reasoning_effort фиксируют repo-configured mapping выбранного executable profile; live availability подтверждается отдельной проверкой `codex debug models`, а advisory handoff text сам по себе ничего не переключает."
  advisory_layers:
    - "AGENTS.md / AGENT.md"
    - "ChatGPT Project instructions"
    - "scenario-pack"
    - ".chatgpt docs и handoff guidance"
  executable_layers:
    - "codex-model-routing.yaml"
    - "scripts/resolve-codex-task-route.py"
    - "scripts/bootstrap-codex-task.py"
    - "scripts/check-codex-model-catalog.py"
    - "scripts/launch-codex-task.sh"
    - "scripts/orchestrate-codex-handoff.py"
    - "scripts/validate-parent-orchestration-plan.py"
    - "scripts/render-orchestration-cockpit.py"
    - "scripts/validate-orchestration-cockpit.py"
    - "scripts/explain-codex-route.py"
    - "scripts/validate-route-explain.py"
    - "scripts/validate-beginner-handoff-ux.py"
    - "scripts/validate-codex-orchestration.py"
    - ".codex/config.toml с именованными profiles"
  launch_sources:
    - "chatgpt-handoff"
    - "direct-task"
  required_handoff_fields:
    - "launch_source"
    - "task_class"
    - "selected_profile"
    - "selected_model"
    - "selected_reasoning_effort"
    - "apply_mode"
    - "strict_launch_mode"
    - "project_profile"
    - "selected_scenario"
    - "pipeline_stage"
    - "artifacts_to_update"
    - "handoff_allowed"
    - "defect_capture_path"
    - "launch_command"
    - "codex_profile_command"

validation:
  live_catalog_check: "Model availability auto-check выполняется через `scripts/check-codex-model-catalog.py` и `codex debug models`; если live catalog недоступен, не обещать, что mapping гарантированно исполним."
  apply_mode_default: "manual-ui"
  strict_launch_mode_default: "optional"
  strict_launch_use_cases:
    - "автоматизация"
    - "воспроизводимость"
    - "запуск из shell"
    - "scripted launch"
  troubleshooting:
    - "Если вы работаете через VS Code Codex extension интерактивно, используйте новый чат/окно, вручную выставьте selected_model и selected_reasoning_effort в picker, а затем вставьте handoff."
    - "Новый чат + вставка handoff и новый task launch через executable launcher — не одно и то же; не выдавайте manual UI apply за auto-switch."
    - "Если handoff вставлен в уже открытую или случайную Codex chat-сессию без ручной проверки picker, это неканонический путь: route может остаться устаревшим."
    - "Если нужна строгая воспроизводимость, автоматизация или запуск из shell, используйте optional strict launch_command."
    - "Если после launch или manual UI apply виден sticky last-used profile/model/reasoning, закройте текущую сессию, откройте новую и при необходимости выполните launch_command, затем проверьте именованный profile в local Codex config."
    - "Если selected_model отсутствует в live catalog, обновите codex-routing.yaml или local profile mapping, прежде чем обещать этот model ID пользователю."
    - "Если новый model ID появился в live catalog, сначала создайте proposal через `scripts/check-codex-model-catalog.py --write-proposal`; promotion profile mapping требует ручного review."

profiles:
  quick:
    model: "gpt-5.4-mini"
    reasoning_effort: "low"
    plan_mode_reasoning_effort: "medium"
    purpose: "Быстрые docs/triage/search и другие малорисковые короткие задачи."
    expected_use_cases:
      - "docs"
      - "triage"
      - "search"
      - "inventory"
      - "lightweight follow-up"
  build:
    model: "gpt-5.5"
    reasoning_effort: "medium"
    plan_mode_reasoning_effort: "medium"
    purpose: "Обычная реализация feature/fix/change через актуальную рекомендуемую Codex model."
    expected_use_cases:
      - "feature"
      - "fix"
      - "implementation"
      - "remediation"
      - "scaffolding"
  deep:
    model: "gpt-5.5"
    reasoning_effort: "high"
    plan_mode_reasoning_effort: "high"
    purpose: "RCA, audit, architecture и другие задачи, где главное - глубина анализа."
    expected_use_cases:
      - "root-cause"
      - "audit"
      - "architecture"
      - "migration"
      - "scenario alignment"
  review:
    model: "gpt-5.5"
    reasoning_effort: "high"
    plan_mode_reasoning_effort: "high"
    purpose: "Review/tests/cleanup/final verification."
    expected_use_cases:
      - "review"
      - "tests"
      - "cleanup"
      - "verification"
      - "release-facing pass"

