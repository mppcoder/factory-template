boundary_actions:
  repo_name: factory-template
  project_name: Factory Template
  default_phase: controlled-fixes
  recommended_sources_pack: sources-pack-core-20.tar.gz
  available_sources_packs:
    - sources-pack-core-20.tar.gz
    - sources-pack-release-20.tar.gz
    - sources-pack-bugfix-20.tar.gz
  phase_recommendations:
    controlled-fixes:
      recommended_sources_pack: sources-pack-core-20.tar.gz
      rationale: основной steady-state набор для повседневной работы по шаблону, runbook layer и policy alignment
    release:
      recommended_sources_pack: sources-pack-release-20.tar.gz
      rationale: release-facing docs, manifests и verify scripts для финальной проверки и packaging
    bugfix-drift:
      recommended_sources_pack: sources-pack-bugfix-20.tar.gz
      rationale: launcher, validator layer и handoff/feedback checks для локализации drift и runtime-багов
  phase_detection:
    release:
      min_matches: 3
      require_document_intent: true
      min_document_signal_matches: 2
      exact_paths:
        - RELEASE_CHECKLIST.md
        - VERIFY_SUMMARY.md
        - RELEASE_NOTE_TEMPLATE.md
        - RELEASE_BUILD.sh
        - FACTORY_MANIFEST.yaml
        - meta-template-project/RELEASE_NOTES.md
      path_prefixes:
        - /projects/_release/
      document_signals:
        RELEASE_CHECKLIST.md:
          - '\[x\]\s+Проверить `CHANGELOG\.md`'
          - '\[x\]\s+`bash VALIDATE_FACTORY_TEMPLATE_OPS\.sh`'
          - '\[x\]\s+`bash PRE_RELEASE_AUDIT\.sh`'
          - '\[x\]\s+release bundle можно собирать'
          - '\[x\]\s+release pass started'
          - '\[x\]\s+release note drafted'
          - '\[x\]\s+go/no-go review in progress'
    bugfix-drift:
      min_matches: 2
      exact_paths:
        - template-repo/launcher.sh
        - VALIDATE_FACTORY_FEEDBACK.sh
        - tools/validate_factory_feedback.py
        - tools/ingest_factory_feedback.py
        - tools/triage_incoming_learnings.py
        - template-repo/scripts/create-codex-task-pack.sh
        - template-repo/scripts/validate-codex-task-pack.sh
      path_prefixes:
        - template-repo/scripts/validate-
        - reports/bugs/
  uploads_dir: /projects/_incoming
