name: "Research / исследование"
description: "Поставить вопрос для исследования перед решением."
title: "[Research]: "
labels: ["task:research", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: "Research-задача должна привести к решению, рекомендации или списку проверенных вариантов. Не прикладывайте приватные источники без редакции."
  - type: textarea
    id: question
    attributes:
      label: "Вопрос"
      description: "Что нужно выяснить?"
    validations:
      required: true
  - type: textarea
    id: sources_to_inspect
    attributes:
      label: "Источники для проверки"
      description: "Repo-файлы, docs, issue, внешние официальные источники."
    validations:
      required: true
  - type: textarea
    id: expected_output
    attributes:
      label: "Ожидаемый результат"
      description: "Например: краткий report, ADR, recommendation, risk register."
    validations:
      required: true
  - type: dropdown
    id: freshness_requirement
    attributes:
      label: "Требование к свежести"
      options:
        - repo-only
        - official current sources required
        - latest public information required
        - no freshness requirement
    validations:
      required: true
  - type: textarea
    id: decision_needed
    attributes:
      label: "Какое решение нужно принять"
      description: "Что станет возможно после исследования?"
    validations:
      required: true
  - type: dropdown
    id: affected_layer
    attributes:
      label: "Затронутый слой"
      options:
        - template-repo
        - generated project
        - ChatGPT handoff
        - Codex execution
        - GitHub workflow
        - VPS/runtime
        - docs/runbook
        - unknown
    validations:
      required: true
  - type: dropdown
    id: codex_involvement
    attributes:
      label: "Ожидаемое участие Codex"
      options:
        - research
        - review
        - handoff only
        - implementation
        - no Codex
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: "Безопасность"
      options:
        - label: "Я проверил(а), что в issue нет секретов, токенов, паролей или private keys."
          required: true
