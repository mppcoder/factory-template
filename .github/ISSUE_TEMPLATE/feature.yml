name: "Feature / новая возможность"
description: "Предложить новую функцию или улучшение."
title: "[Feature]: "
labels: ["task:feature", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: "Это локальная задача текущего repo, не upstream report в factory-template. Опишите желаемый результат. Если приводите примеры из реального проекта, заранее удалите приватные данные."
  - type: textarea
    id: goal
    attributes:
      label: "Цель задачи"
      description: "Что нужно получить?"
    validations:
      required: true
  - type: textarea
    id: user_value
    attributes:
      label: "Польза для пользователя"
      description: "Кому и чем это поможет?"
    validations:
      required: true
  - type: textarea
    id: expected_behavior
    attributes:
      label: "Ожидаемое поведение"
      description: "Как это должно работать после реализации?"
    validations:
      required: true
  - type: dropdown
    id: affected_layer
    attributes:
      label: "Затронутый слой"
      options:
        - template-repo
        - generated project
        - ChatGPT handoff
        - Codex execution
        - GitHub workflow
        - VPS/runtime
        - docs/runbook
        - unknown
    validations:
      required: true
  - type: textarea
    id: examples
    attributes:
      label: "Примеры"
      description: "Пример команды, текста handoff, workflow или пользовательского сценария."
  - type: textarea
    id: success_criteria
    attributes:
      label: "Критерии успеха"
      description: "По каким проверкам будет понятно, что задача готова?"
    validations:
      required: true
  - type: dropdown
    id: codex_involvement
    attributes:
      label: "Ожидаемое участие Codex"
      options:
        - implementation
        - handoff only
        - review
        - research
        - no Codex
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: "Безопасность"
      options:
        - label: "Я проверил(а), что в issue нет секретов, токенов, паролей или private keys."
          required: true
