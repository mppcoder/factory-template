name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-baseline:
    name: verify-baseline
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements.lock

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Run consolidated verification
        run: bash template-repo/scripts/verify-all.sh ci

  release-bundle-dry-run:
    name: release-bundle-dry-run
    runs-on: ubuntu-latest
    needs: verify-baseline
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements.lock

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Build release bundle (dry-run)
        run: |
          bash CLEAN_VERIFY_ARTIFACTS.sh
          OUT_ZIP="$RUNNER_TEMP/factory-template-release.zip"
          bash RELEASE_BUILD.sh "$OUT_ZIP"
          test -s "$OUT_ZIP"

      - name: Upload release bundle artifact
        uses: actions/upload-artifact@v7
        with:
          name: factory-template-release-bundle-dry-run
          path: ${{ runner.temp }}/factory-template-release.zip
          if-no-files-found: error
          retention-days: 7
