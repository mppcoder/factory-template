version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Moscow"
    labels:
      - "dependencies"
      - "github-actions"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "ci"
      include: "scope"

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:30"
      timezone: "Europe/Moscow"
    labels:
      - "dependencies"
      - "python"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "deps"
      include: "scope"
